    seg.push({t:tempos[k].t,sec,us:tempos[k].us});

  const toSec=t=>{let s=seg[0];for(const x of seg){if(x.t<=t)s=x;else break;}

function b64bytes(b64){
  const s=atob(b64), u=new Uint8Array(s.length);
  for(let k=0;k<s.length;k++)u[k]=s.charCodeAt(k);
  return u;
}

function pulseWave(d){
  const n=32, re=new Float32Array(n), im=new Float32Array(n);
  for(let i=1;i<n;i++)im[i]=(2/(i*Math.PI))*Math.sin(Math.PI*d*i);
  return ac.createPeriodicWave(re,im);
}
function initAudio(){
  if(ac)return;
  ac=new (window.AudioContext||window.webkitAudioContext)();
  master=ac.createGain(); master.gain.value=.52; master.connect(ac.destination);
  filt=ac.createBiquadFilter(); filt.type='lowpass'; filt.frequency.value=12000;
  musicBus=ac.createGain(); musicBus.connect(filt); filt.connect(master);
  echoIn=ac.createGain(); const dl=echoDelay=ac.createDelay(1); dl.delayTime.value=.42;
  const fb=ac.createGain(); fb.gain.value=.3; const wet=ac.createGain(); wet.gain.value=.22;
  echoIn.connect(dl); dl.connect(fb); fb.connect(dl); dl.connect(wet); wet.connect(musicBus);
  noiseBuf=ac.createBuffer(1,ac.sampleRate,ac.sampleRate);
  const d=noiseBuf.getChannelData(0); for(let i=0;i<d.length;i++)d[i]=Math.random()*2-1;
  windGain=ac.createGain(); windGain.gain.value=0; windGain.connect(master);
  const wn=ac.createBufferSource(); wn.buffer=noiseBuf; wn.loop=true;
  const wf=ac.createBiquadFilter(); wf.type='bandpass'; wf.frequency.value=520; wf.Q.value=.5;
  wn.connect(wf); wf.connect(windGain); wn.start();
  const lfo=ac.createOscillator(), lg=ac.createGain();
  lfo.frequency.value=.08; lg.gain.value=.01;
  lfo.connect(lg); lg.connect(windGain.gain); lfo.start();
  pw25=pulseWave(.25); pw125=pulseWave(.125);
  musicOn=true;
  setInterval(tick,80);
}
function env(t,dur,vol,rel,sus){
  const gn=ac.createGain(); gn.gain.setValueAtTime(.0001,t);
  gn.gain.linearRampToValueAtTime(vol,t+.012);
  if(sus===false){ gn.gain.exponentialRampToValueAtTime(.0008,t+dur); }
  else{ gn.gain.setValueAtTime(vol,t+Math.max(.012,dur-.05));
        gn.gain.exponentialRampToValueAtTime(.0008,t+dur+(rel||.06)); }
  return gn;
}
function voice(t,midi,dur,vol,o){
  o=o||{};
  const osc=ac.createOscillator();
  if(o.wave==='tri')osc.type='triangle';
  else if(o.wave==='p25')osc.setPeriodicWave(pw25);
  else if(o.wave==='p125')osc.setPeriodicWave(pw125);
  else osc.type='square';
  osc.frequency.value=nfr(midi);
  if(o.detune)osc.detune.value=o.detune;
  if(o.vib){
    const lfo=ac.createOscillator(),lg=ac.createGain();
    lfo.frequency.value=5.2; lg.gain.setValueAtTime(0,t);
    lg.gain.linearRampToValueAtTime(nfr(midi)*.01,t+.25);
    lfo.connect(lg); lg.connect(osc.frequency); lfo.start(t); lfo.stop(t+dur+.2);
  }
  const gn=env(t,dur,vol,o.rel,o.sus);
  osc.connect(gn); gn.connect(musicBus);
  if(o.echo){const s=ac.createGain();s.gain.value=o.echo;gn.connect(s);s.connect(echoIn);}
  osc.start(t); osc.stop(t+dur+(o.rel||.12));
}
function noiseHit(t,vol,dur,type,f,q){
  const src=ac.createBufferSource(); src.buffer=noiseBuf;
  src.playbackRate.value=.9+Math.random()*.2;
  const bf=ac.createBiquadFilter(); bf.type=type; bf.frequency.value=f; bf.Q.value=q||.8;
  const gn=env(t,dur,vol,.02,false);
  src.connect(bf); bf.connect(gn); gn.connect(master);
  src.start(t); src.stop(t+dur+.05);
}
function kick(t,v){
  noiseHit(t,.1*v,.07,'lowpass',180);
  const o=ac.createOscillator(); o.type='sine';
  o.frequency.setValueAtTime(115,t); o.frequency.exponentialRampToValueAtTime(44,t+.1);
  const gn=env(t,.12,.24*v,.02,false); o.connect(gn); gn.connect(master); o.start(t); o.stop(t+.17);
}
function percHit(t,n,v){
  if(n===35||n===36)kick(t,v);
  else if(n===38||n===40||n===37)noiseHit(t,.12*v,.1,'bandpass',1900,1.2);
  else if(n===42||n===44)noiseHit(t,.045*v,.03,'highpass',7500);
  else if(n===46)noiseHit(t,.05*v,.12,'highpass',6500);
  else if(n===49||n===52||n===55||n===57)noiseHit(t,.06*v,.35,'highpass',4800);
  else if(n>=41&&n<=48)noiseHit(t,.09*v,.09,'lowpass',420);
  else noiseHit(t,.03*v,.03,'highpass',8000);
}
function playMidiNote(song,e,at){
  const S=SECTIONS[curSection]||{}; const mv=musicVol*(S.vol||1);
  const vol=.19*(.35+.65*e.v);
  let role=song.roles[e.tr]||'solo';
  if(role==='solo')role=e.m<52?'bass':'lead';
  let m=e.m;
  if(role==='bass'){
    if(m<34)m+=12;
    voice(at,m,e.d,vol*1.0*mv,{wave:'tri'});
  }else if(role==='mid'){
    voice(at,m,e.d,vol*.5*mv,{wave:'p25'});
  }else{
    voice(at,m,e.d,vol*.75*mv,{vib:e.d>.5,echo:S.echo||.4});
  }
}
function switchSong(key){
  const s=SONGS[key]; if(!s)return;
  activeSong=key;
  const now=ac.currentTime;
  musicBus.gain.setTargetAtTime(.12,now,.12);          // gentle hand-off dip
  musicBus.gain.setTargetAtTime(1,now+.35,.2);
  s.start=now+.3; s.ptr=0; s.percPtr=0;
}
function tickMidi(){
  const now=ac.currentTime, horizon=now+.4;
  const S=SECTIONS[curSection]||{};
  const want=S.song&&SONGS[S.song]?S.song:(SONGS.pride?'pride':'emiya');
  if(want!==activeSong)switchSong(want);
  const song=SONGS[activeSong]; if(!song)return;
  filt.frequency.setTargetAtTime(S.lp||12000,now,.3);
  let guard=0;
  while(guard++<4000){
    if(song.ptr<song.ev.length){
      const e=song.ev[song.ptr], at=song.start+e.t;
      if(at>=horizon)break;
      song.ptr++;
      if(at<now-.05)continue;
      playMidiNote(song,e,at);
    }else if(song.start+song.dur<horizon){
      song.start+=song.dur; song.ptr=0; song.percPtr=0;
    }else break;
  }
  guard=0;
  while(guard++<4000&&song.percPtr<song.perc.length){
    const e=song.perc[song.percPtr], at=song.start+e.t;
    if(at>=horizon)break;
    song.percPtr++;
    if(at<now-.05)continue;
    percHit(at,e.n,e.v);
  }
}
function tick(){ if(musicOn&&state==='film')tickMidi(); }

      const wv=Math.sin(st*1.6+gx2*.05+gy*.02);
      g.fillStyle=wv>.3?'rgba(216,200,120,.5)':'rgba(90,130,60,.5)';
      g.fillRect(gx2+((wv*2)|0),gy,2,1);
    }
    // the tree
    R(296,60,10,70,'#4a3a28'); R(290,120,22,8,'#3d3020');
    g.fillStyle='#5c8a3c';
    R(266,34,70,34,'#5c8a3c'); R(276,24,50,16,'#68984a'); R(258,50,86,22,'#548436');
    g.fillStyle='rgba(216,200,120,.5)';
    for(let i=0;i<30;i++)g.fillRect(262+(i*17)%76,28+(i*13)%40,2,1);
    // light motes
    for(const m of S_.motes){
      m.y-=m.v*dt*.4; m.x+=Math.sin(st*.5+m.p)*dt*6;
      if(m.y<20){m.y=190;m.x=Math.random()*W;}
      const tw=.3+.6*Math.max(0,Math.sin(st*1.8+m.p));
      g.fillStyle=`rgba(240,232,190,${tw*.8})`; g.fillRect(m.x|0,m.y|0,1,1);
    }
    // saber in white, waiting by the tree; shirou arrives from the left
    const sx=clamp(st/14,0,1)*196+36;
    const met=sx>=228;
    if(met&&!S_.met){S_.met=true;}
    drawSaber(252,176,st,'white');
    drawShirou(Math.min(sx,238)|0,178,st,met?'stand':'walk');
    caption([
      [2,6,"AVALON. OUTSIDE OF TIME. OUTSIDE OF EVERYTHING."],
      [8,12,"SHE TURNS. HE STOPS. NO ONE HURRIES NOW."],
      [15,19.5,'"I TOLD YOU. I WOULD WAIT FOR YOU."','SABER'],
    ],st);
    if(st>21){
      ctext("THE STORY ENDS WHERE IT BEGAN:",84,`rgba(239,234,222,${clamp((st-21)/2,0,.9)})`,1);
      ctext("A BOY AND A KING",96,`rgba(239,234,222,${clamp((st-21.6)/2,0,.9)})`,1);
      if(st>24&&(st*1.2|0)%2)ctext("CLICK TO BEGIN AGAIN",H-10,'#5a7a5a',1);
    }
    if(st>16)musicVol=Math.max(.4,1-(st-16)*.04);
  }},
];

/* ---------------- title ---------------- */
function drawTitle(t){
  R(0,0,W,H,'#0b0a10');
  for(let y0=0;y0<H;y0+=14)R(0,y0,W,1,'#131017');
  for(const vx of [50,140,250,330])R(vx,0,2,H,'#131017');
  const cx=192,cy=170;
  const pulse=.5+.15*Math.sin(t*1.2);
  for(let k=0;k<3;k++)ring(cx,cy,26+k*9,.32,`rgba(150,190,230,${pulse*(.6-k*.15)})`);
  const rr=mulberry(7);
  g.fillStyle=`rgba(150,190,230,${pulse*.7})`;
  for(let k=0;k<22;k++){const a=rr()*6.28,d2=14+rr()*26;
    g.fillRect(cx+Math.cos(a)*d2|0,cy+Math.sin(a)*d2*.32|0,1,1);}
  ctext("FATE/STAY NIGHT",64,C.white,2);
  ctext("16-BIT · SABER",90,C.bone,1);
  R(W/2-60,102,120,1,'#242838');
  if((t*1.6|0)%2)ctext("PRESS START",130,'#8a93a5',1);
  ctext("A TRIBUTE IN PIXELS AND SQUARE WAVES",H-12,'#2c2f40',1);
}

/* ---------------- main loop ---------------- */
let last=0;
try{ localStorage.setItem('fate16_views',
  (+localStorage.getItem('fate16_views')||1)+1); }catch(e){}
const qp=new URLSearchParams(location.search);
if(qp.get('t')!==null){ state='film'; filmT=parseFloat(qp.get('t'))||0; }

function sceneAt(t){
  let acc=0;
  for(let i=0;i<SCN.length;i++){ if(t<acc+SCN[i].dur)return[i,t-acc]; acc+=SCN[i].dur; }
  return[SCN.length-1,t-acc+SCN[SCN.length-1].dur];
}
function frame(ts){
  requestAnimationFrame(frame);
  const dt=Math.min(.05,(ts-last)/1000)||.016; last=ts;
  if(state==='title'){ drawTitle(ts/1000); curSection='none'; return; }
  if(!window._frozen)filmT+=dt;
  const [i,st]=sceneAt(filmT), sc=SCN[i];
  if(i!==sceneIdx){ sceneIdx=i; S_={}; if(sc.init)sc.init(); }
  curSection=sc.sec;
  sc.draw(st,dt);
  if(st<.6)R(0,0,W,H,`rgba(0,0,0,${1-st/.6})`);
  const rem=sc.dur-st;
  if(sc.dur<1e8&&rem<.6)R(0,0,W,H,`rgba(0,0,0,${1-rem/.6})`);
  for(let k=0;k<26;k++){g.fillStyle=Math.random()<.5?'rgba(255,255,255,.04)':'rgba(0,0,0,.06)';
    g.fillRect(Math.random()*W|0,Math.random()*H|0,1,1);}
}
requestAnimationFrame(frame);

addEventListener('pointerdown',()=>{
  if(state==='title'){
    initAudio(); if(ac.state==='suspended')ac.resume();
    state='film'; filmT=0; sceneIdx=-1; musicVol=1; syncSong(); sfxChime();
  }else if(SCN[sceneIdx]&&SCN[sceneIdx].name==='avalon'){
    const st=sceneAt(filmT)[1];
    if(st>24){ state='title'; sceneIdx=-1; curSection='none'; musicVol=1; if(windGain)setWind(0); }
  }
});
window.seek=(s,fr)=>{state='film';filmT=s;sceneIdx=-1;window._frozen=!!fr;syncSong();};
addEventListener('keydown',e=>{
  if(e.key==='ArrowRight'&&state==='film'){
    let acc=0; for(let i=0;i<=sceneIdx;i++)acc+=SCN[i].dur; filmT=acc;
  }
});
</script>
