/* ---------------- utils ---------------- */
function mulberry(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;}}
const clamp=(v,a,b)=>v<a?a:v>b?b:v;
const lerp=(a,b,t)=>a+(b-a)*t;
function hex(c){return[parseInt(c.slice(1,3),16),parseInt(c.slice(3,5),16),parseInt(c.slice(5,7),16)];}
function mix(c1,c2,t){const a=hex(c1),b=hex(c2);t=clamp(t,0,1);
  return `rgb(${(lerp(a[0],b[0],t))|0},${(lerp(a[1],b[1],t))|0},${(lerp(a[2],b[2],t))|0})`;}

function drawText(s,x,y,c,sc){
  sc=sc||1; g.fillStyle=c; s=(''+s).toUpperCase();
  let cx=x|0;
  for(const ch of s){
    if(ch===' '){cx+=4*sc;continue;}
    const gl=FONT[ch];
    if(gl){for(let r=0;r<5;r++)for(let b=0;b<3;b++)
      if(gl[r]>>(2-b)&1)g.fillRect(cx+b*sc,(y|0)+r*sc,sc,sc);}
    cx+=4*sc;
  }
}

/* ---- MIDI playback (loads the user's .mid at runtime) ---- */
let MIDI=null, songStart=0, midiPtr=0, beatPtr=0;
function parseMidi(u){
  const rd32=i=>((u[i]<<24|u[i+1]<<16|u[i+2]<<8|u[i+3])>>>0), rd16=i=>u[i]<<8|u[i+1];
  if(u[0]!==0x4D||u[1]!==0x54||u[2]!==0x68||u[3]!==0x64)return null;
  const ntrk=rd16(10), tpq=rd16(12);
  let i=14; const raw=[], tempos=[{t:0,us:500000}];
  for(let tr=0;tr<ntrk;tr++){
    if(rd32(i)!==0x4D54726B)return null;       // 'MTrk'
    const len=rd32(i+4); let j=i+8; const end=j+len, on={}; let t=0,run=0;
    while(j<end){
      let v=0,b;
      do{b=u[j++];v=(v<<7)|(b&127);}while(b&128);
      t+=v;
      let s=u[j];
      if(s===0xFF){ const mt=u[j+1]; let ln=0; j+=2;
        do{b=u[j++];ln=(ln<<7)|(b&127);}while(b&128);
        if(mt===0x51)tempos.push({t,us:u[j]<<16|u[j+1]<<8|u[j+2]});
        j+=ln;
      }else if(s===0xF0||s===0xF7){ let ln=0; j++;
        do{b=u[j++];ln=(ln<<7)|(b&127);}while(b&128); j+=ln;
      }else{
        if(s&0x80){run=s;j++;}else s=run;
        const hi=s&0xF0;
        if(hi===0xC0||hi===0xD0)j+=1;
        else{ const p1=u[j],p2=u[j+1]; j+=2;
          if(hi===0x90&&p2>0)(on[p1]=on[p1]||[]).push({t,v:p2});
          else if(hi===0x80||(hi===0x90&&p2===0)){
            const q=(on[p1]||[]).shift(); if(q)raw.push({st:q.t,en:t,m:p1,v:q.v,tr});
          }
        }
      }
    }
    i=end;
  }
  tempos.sort((a,b)=>a.t-b.t);
  const seg=[]; let sec=0;
  for(let k=0;k<tempos.length;k++){
    if(k>0)sec+=(tempos[k].t-tempos[k-1].t)/tpq*tempos[k-1].us/1e6;
    seg.push({t:tempos[k].t,sec,us:tempos[k].us});
  }
  const toSec=t=>{let s=seg[0];for(const x of seg){if(x.t<=t)s=x;else break;}
    return s.sec+(t-s.t)/tpq*s.us/1e6;};
  const ev=raw.map(n=>({t:toSec(n.st),d:Math.max(.09,toSec(n.en)-toSec(n.st)),m:n.m,v:n.v/127,tr:n.tr}))
    .sort((a,b)=>a.t-b.t);
  if(!ev.length)return null;
  // which track is the low/accompaniment hand? (lowest average pitch, if >1 track has notes)
  const sum={},cnt={};
  for(const e of ev){sum[e.tr]=(sum[e.tr]||0)+e.m;cnt[e.tr]=(cnt[e.tr]||0)+1;}
  const trks=Object.keys(cnt);
  const bassTrack=trks.length>1
    ? +trks.reduce((a,b)=>sum[a]/cnt[a]<=sum[b]/cnt[b]?a:b) : -1;
  const spb=seg[0].us/1e6;
  const dur=ev.reduce((m,e)=>Math.max(m,e.t+e.d),0)+spb*2;
  return {ev,dur,spb,bassTrack,rubato:tempos.length>3};
}

function midiReady(){
  window._midiOK=!!MIDI;
  if(!MIDI)return;
  window._midiInfo={notes:MIDI.ev.length,dur:MIDI.dur,bassTrack:MIDI.bassTrack,rubato:MIDI.rubato,src:MIDI.src};
  if(echoDelay)echoDelay.delayTime.value=MIDI.spb*.75;
}
(function loadMidi(){
  try{
    if(MIDI_B64&&MIDI_B64[0]!=='@'){
      const s=atob(MIDI_B64), u=new Uint8Array(s.length);
      for(let k=0;k<s.length;k++)u[k]=s.charCodeAt(k);
      MIDI=parseMidi(u); if(MIDI)MIDI.src='embedded';
    }
  }catch(e){MIDI=null;}
  if(MIDI){midiReady();return;}
  fetch('weight-of-the-world.mid')
    .then(r=>{if(!r.ok)throw 0;return r.arrayBuffer();})
    .then(b=>{ MIDI=parseMidi(new Uint8Array(b)); if(MIDI)MIDI.src='fetched'; midiReady(); })
    .catch(()=>{window._midiOK=false;});
})();
function syncSong(t){ if(ac&&MIDI){ songStart=ac.currentTime-(t%MIDI.dur); midiPtr=0; beatPtr=0; } }
function playMidiNote(e,at){
  const mv=musicVol; let vol=.2*(.35+.65*e.v), det=0;
  if(curSection==='broken'){ if(Math.random()<.4)return; det=(Math.random()-.5)*70; }
  if(curSection==='intro')vol*=.7;
  if(curSection==='rain')vol*=.75;
  if(curSection==='outro')vol*=.55;
  const isBass=MIDI.bassTrack>=0 ? e.tr===MIDI.bassTrack : e.m<52;
  if(isBass) voice(at,e.m,e.d,vol*(e.m<52?1.05:.7)*mv,{wave:'tri',detune:det});
  else{
    voice(at,e.m,e.d,vol*.8*mv,{vib:e.d>.4,echo:curSection==='outro'?.8:.5,detune:det});
    if(curSection==='full')voice(at,e.m+12,e.d,vol*.2*mv,{wave:'p25',echo:.4});
  }
}
function tickMidi(){
  const now=ac.currentTime, horizon=now+.4;
  const S=SECTIONS[curSection]||{};
  let lp=S.lp||12000; if(curSection==='broken')lp=600+Math.random()*1200;
  filt.frequency.setTargetAtTime(lp,now,.3);
  let guard=0;
  while(guard++<2000){
    if(midiPtr<MIDI.ev.length){
      const e=MIDI.ev[midiPtr], at=songStart+e.t;
      if(at>=horizon)break;
      midiPtr++;
      if(at<now-.05)continue;                  // skip already-past events after a seek
      playMidiNote(e,at);
    }else{
      if(songStart+MIDI.dur>=horizon)break;    // wait for loop point
      songStart+=MIDI.dur; midiPtr=0; beatPtr=0;
    }
  }
  // drums ride the MIDI beat grid, credits only — skipped for rubato performances
  if(MIDI.rubato)return;
  const e8=MIDI.spb/2;
  while(songStart+beatPtr*e8<horizon){
    const at=songStart+beatPtr*e8, b8=beatPtr; beatPtr++;
    if(at<now||curSection!=='full')continue;
    if(b8%8===0)kick(at);
    if(b8%8===4)noiseHit(at,.13,.12,'bandpass',1800,1.2);
    noiseHit(at,b8%2===0?.04:.02,.03,'highpass',7000);
  }
}

function pulseWave(d){
  const n=32, re=new Float32Array(n), im=new Float32Array(n);
  for(let i=1;i<n;i++)im[i]=(2/(i*Math.PI))*Math.sin(Math.PI*d*i);
  return ac.createPeriodicWave(re,im);
}
function initAudio(){
  if(ac)return;
  ac=new (window.AudioContext||window.webkitAudioContext)();
  master=ac.createGain(); master.gain.value=.55; master.connect(ac.destination);
  filt=ac.createBiquadFilter(); filt.type='lowpass'; filt.frequency.value=12000;
  musicBus=ac.createGain(); musicBus.connect(filt); filt.connect(master);
  // echo
  echoIn=ac.createGain(); const dl=echoDelay=ac.createDelay(1);
  dl.delayTime.value=MIDI?MIDI.spb*.75:STEP*3;
  const fb=ac.createGain(); fb.gain.value=.34; const wet=ac.createGain(); wet.gain.value=.25;
  echoIn.connect(dl); dl.connect(fb); fb.connect(dl); dl.connect(wet); wet.connect(musicBus);
  // noise
  noiseBuf=ac.createBuffer(1,ac.sampleRate,ac.sampleRate);
  const d=noiseBuf.getChannelData(0); for(let i=0;i<d.length;i++)d[i]=Math.random()*2-1;
  rainGain=ac.createGain(); rainGain.gain.value=0; rainGain.connect(master);
  const rn=ac.createBufferSource(); rn.buffer=noiseBuf; rn.loop=true;
  const rf=ac.createBiquadFilter(); rf.type='lowpass'; rf.frequency.value=900;
  rn.connect(rf); rf.connect(rainGain); rn.start();

function env(t,dur,vol,rel,sus){
  const gn=ac.createGain(); gn.gain.setValueAtTime(.0001,t);
  gn.gain.linearRampToValueAtTime(vol,t+.012);
  if(sus===false){ gn.gain.exponentialRampToValueAtTime(.0008,t+dur); }
  else{ gn.gain.setValueAtTime(vol,t+Math.max(.012,dur-.05));
        gn.gain.exponentialRampToValueAtTime(.0008,t+dur+(rel||.06)); }
  return gn;
}

function schedStep(i,t){
  const sb=i%16, bar=(i>>4)%8, ch=CHORDS[bar];
  if(sb===0){
    barSec=curSection;

    let lp=S0.lp||12000; if(S0.glitch)lp=600+Math.random()*1200;
    filt.frequency.setTargetAtTime(lp,t,.25);
  }
  const S=SECTIONS[barSec]||{}; const mv=musicVol;
  // bass
  if(S.bass){
    if(sb===0)voice(t,ch.b,STEP*7,.17*S.bass*mv,{wave:'tri'});
    if(sb===8)voice(t,ch.b,STEP*3.5,.15*S.bass*mv,{wave:'tri'});
    if(sb===12&&S.dr)voice(t,ch.b+7,STEP*3.5,.13*mv,{wave:'tri'});
  }
  if(S.bassSoft&&sb===0)voice(t,ch.b,STEP*15,.09*mv,{wave:'tri'});
  // arpeggio
  const arpPat=[0,7,12,ch.min?15:16,12,7,12,7];
  if(S.arp&&sb%2===0)
    voice(t,ch.r+12+arpPat[sb/2],STEP*1.7,.055*S.arp*mv,{wave:'p25',echo:.5,sus:false});
  if(S.arpQ&&sb%4===0)
    voice(t,ch.r+12+[0,7,12,ch.min?15:16][sb/4],STEP*3.6,.06*mv,{wave:'tri',echo:.7,sus:false});
  // pad
  if(S.pad&&sb===0)for(const iv of [0,ch.min?3:4,7])
    voice(t,ch.r+12+iv,STEP*15.5,.028*S.pad*mv,{wave:'p125',detune:(iv?4:-4)});
  // lead melody
  const e=MEL[i%128];
  if(e&&S.lead){
    let skip=false,det=0;
    if(S.glitch){ if(Math.random()<.4)skip=true; det=(Math.random()-.5)*70; }
    if(!skip)voice(t,e.m+(S.leadOct||0),STEP*e.d*.96,.15*S.lead*mv,
      {vib:true,echo:.6,detune:det});
  }
  if(e&&S.mbox)
    voice(t,e.m+12,STEP*e.d*1.4,.09*mv,{wave:'p25',echo:.8,sus:false,rel:.3});
  // counter canon (credits only)
  const e2=MEL[(i+120)%128];
  if(e2&&S.cnt)voice(t,e2.m-12,STEP*e2.d*.9,.06*mv,{wave:'p25',echo:.4});
  // drums
  if(S.dr){
    if(sb===0)kick(t);
    if(sb===8)noiseHit(t,.13,.12,'bandpass',1800,1.2);
    if(sb===12&&bar%2===1)kick(t);
    if(sb%2===0)noiseHit(t,sb%4===0?.045:.025,.03,'highpass',7000);
  }
  if(S.glitch&&Math.random()<.12)noiseHit(t,.08,.05,'bandpass',300+Math.random()*3000,3);
}

function genLayer(seed,gY,hMin,hMax){
  const rnd=mulberry(seed), bs=[]; let x=0;
  while(x<W*2){
    const w=14+rnd()*30|0, h=hMin+rnd()*(hMax-hMin)|0;
    const cols=[]; const nc=Math.max(2,w/4|0);
    for(let ci=0;ci<nc;ci++)cols.push(h-(rnd()<.4?rnd()*h*.45|0:0));
    bs.push({x,w,h,cols,veg:rnd()<.5,win:rnd()<.7,gY});
    x+=w+(2+rnd()*26|0);
  }
  return {bs,span:W*2};
}
function drawLayer(L,off,col,detail){
  for(const b of L.bs){
    let sx=((b.x-off)%L.span+L.span)%L.span; if(sx>W+50)sx-=L.span;
    if(sx+b.w<0||sx>W)continue;
    const cw=b.w/b.cols.length;
    g.fillStyle=col;
    for(let ci=0;ci<b.cols.length;ci++)
      g.fillRect(sx+ci*cw|0,b.gY-b.cols[ci],Math.ceil(cw),b.cols[ci]);
    if(detail){
      if(b.veg){g.fillStyle=C.olive;
        for(let ci=0;ci<b.cols.length;ci+=2)g.fillRect(sx+ci*cw|0,b.gY-b.cols[ci]-2,cw+1|0,3);}
      if(b.win){g.fillStyle='rgba(10,10,14,.85)';
        for(let wy=b.gY-b.h+6;wy<b.gY-6;wy+=7)for(let wx=3;wx<b.w-3;wx+=6)
          if(((wx*7+wy*13+b.x)%11)<6)g.fillRect(sx+wx,wy,2,3);}
    }
  }
}

    S_.fire=0; S_.deaths=0; S_.msgs=[]; S_.msgT=0;
    S_.help=["RESCUE OFFER: PLAYER_9S","RESCUE OFFER: YUI.A2","RESCUE OFFER: EMIL_HEAD",
      "RESCUE OFFER: DEVOLA AND POPOLA","RESCUE OFFER: JACKASS","RESCUE OFFER: ANEMONE",
      "RESCUE OFFER: PASCAL","RESCUE OFFER: SOMEONE, SOMEWHERE"];
  },
  draw(st,dt){
    R(0,0,W,H,'#060609'); drawStars(st,.7);
    const sp=S_.ship, allied=st>18;
    // scroll credits
    for(const L of S_.lines){ L.y-=dt*10.5; }
    // ship control
    if(sp.alive){ sp.x=W/2+Math.sin(st*.9)*90+Math.sin(st*2.3)*24;
      if(st>6.8&&st<7||st>13.8&&st<14){ // scripted deaths
        if(sp.alive){sp.alive=false;sp.rt=1.4;S_.deaths++;sfxBoom(.1);
          for(let i=0;i<26;i++)S_.parts.push({x:sp.x,y:177,vx:Math.random()*80-40,vy:Math.random()*-60,l:.9,c:C.white});}
      }
    } else { sp.rt-=dt; if(sp.rt<=0)sp.alive=true; }
    // allies appear
    if(allied&&S_.allies.length<4)for(let i=S_.allies.length;i<4;i++)S_.allies.push({o:(i+1)*(i%2?18:-18)});
    if(allied){ S_.msgT+=dt; if(S_.msgT>1.5&&S_.help.length){S_.msgT=0;S_.msgs.push({t:S_.help.shift(),l:4});} }
    // firing
    S_.fire-=dt;
    if(sp.alive&&S_.fire<=0){ S_.fire=.13;
      S_.bul.push({x:sp.x,y:172,vy:-150});
      for(const a of S_.allies)S_.bul.push({x:sp.x+a.o,y:177,vy:-150});
      if(Math.random()<.4)sfxShot(); }
    // enemy fire
    for(const L of S_.lines)if(!L.dead&&L.t&&L.y>10&&L.y<150&&Math.random()<dt*.25)
      S_.ebul.push({x:W/2+(Math.random()*120-60),y:L.y,vy:55});
    // bullets
    for(const b of S_.bul){ b.y+=b.vy*dt;
      for(const L of S_.lines){ if(L.dead||!L.t)continue;
        if(Math.abs(b.y-L.y-2)<5&&Math.abs(b.x-W/2)<textW(L.t,1)/2+3){
          L.hp-=allied?3:1; if((L.hp&3)===0)L.cut++; b.y=-99;
          S_.parts.push({x:b.x,y:L.y,vx:0,vy:-14,l:.35,c:C.bone});
          if(L.hp<=0){L.dead=true;sfxBoom(.04);
            for(let i=0;i<10;i++)S_.parts.push({x:b.x,y:L.y,vx:Math.random()*60-30,vy:Math.random()*-40,l:.7,c:C.lgrey});}
          break; }}}
    S_.bul=S_.bul.filter(b=>b.y>-10);
    for(const b of S_.ebul){ b.y+=b.vy*dt;
      if(sp.alive&&Math.abs(b.x-sp.x)<4&&Math.abs(b.y-176)<5){
        sp.alive=false;sp.rt=1.2;S_.deaths++;b.y=999;sfxBoom(.1);
        for(let i=0;i<26;i++)S_.parts.push({x:sp.x,y:177,vx:Math.random()*80-40,vy:Math.random()*-60,l:.9,c:C.white});}}
    S_.ebul=S_.ebul.filter(b=>b.y<H+10);
    // draw credits text
    for(const L of S_.lines){ if(L.dead||!L.t||L.y<-6||L.y>H+6)continue;
      const cut=Math.min(L.cut,(L.t.length-1)>>1);
      const vis=L.t.slice(cut,L.t.length-cut);
      ctext(vis,L.y|0,L.t===L.t.toUpperCase()&&L.t.length<14?C.white:C.bone,1); }
    // draw bullets/particles/ships
    g.fillStyle=C.white; for(const b of S_.bul)g.fillRect(b.x|0,b.y|0,1,3);
    g.fillStyle=C.red;   for(const b of S_.ebul)g.fillRect(b.x|0,b.y|0,2,2);
    for(const p of S_.parts){ p.x+=p.vx*dt;p.y+=p.vy*dt;p.l-=dt;
      if(p.l>0){g.fillStyle=p.c;g.fillRect(p.x|0,p.y|0,1,1);} }
    S_.parts=S_.parts.filter(p=>p.l>0);
    function ship(x,y,c){ R(x,y+4,1,2,'#e8a040'); R(x-1,y,3,3,c); R(x-2,y+2,5,2,c); R(x,y-1,1,1,c); }
    if(sp.alive){ ship(sp.x|0,174,C.white);
      for(const a of S_.allies)ship((sp.x+a.o)|0,179,C.bone); }
    // help ticker
    let my=H-34;
    for(const m of S_.msgs){ m.l-=dt; if(m.l>0){ drawText(m.t,6,my,`rgba(200,195,180,${clamp(m.l,0,1)})`,1); my-=8; } }
    S_.msgs=S_.msgs.filter(m=>m.l>0);
    caption([
      [1,5,'"PROPOSAL: CEASE THIS POINTLESS STRUGGLE."','POD 153'],
      [8,12,'"THIS IS THE FATE OF ALL ANDROIDS."','POD 153'],
      [15,18.5,'"QUERY: DO YOU WISH FOR THEM TO LIVE?"','POD 042'],
      [19.5,23,'"...YES. EVERYTHING."','POD 042'],
      [27,32,'"A FUTURE IS NOT GIVEN TO YOU."','POD 042'],
    ],st);
  }},
/* ---- 7 DAWN ---- */
{ name:'dawn', dur:1e9, sec:'outro',
  init(){S_.fly=[];const r=mulberry(21);for(let i=0;i<26;i++)
    S_.fly.push({x:r()*W,y:60+r()*130,p:r()*7,v:2+r()*4});
    S_.t0=0;},
  draw(st,dt){
    const d=clamp(st/22,0,1);            // dawn rises
    bands([
      mix('#141420','#3a3550',d), mix('#181826','#5d4a58',d),
      mix('#1d1c2c','#8a6355',d), mix('#232030','#b98a58',d),
      mix('#282434','#e0b168',d),
    ],0,166);
    drawStars(st,1-d);
    // sun sliver
    if(d>.25){ const sh=(d-.25)*16|0;
      R(184,166-sh,16,sh,mix('#c99a5a','#f0d488',d)); R(180,166-sh+2,24,Math.max(0,sh-2),'rgba(240,212,136,.4)');}
    // grass field
    R(0,166,W,H-166,mix('#141810','#25301b',d));
    for(let i=0;i<96;i++){ const gx=i*4+((i*7)%5);
      if((i*13)%7<2)continue;
      const hgt=2+((i*13)%4), sway=Math.sin(st*1.2+i)*1;
      g.fillStyle=mix((i%3)?'#1d2415':'#2a331d',(i%3)?'#39482a':'#59683a',d);
      g.fillRect(gx+sway|0,167-hgt,1,hgt+2); }
    // the three of them, at rest
    drawTwoB(150,180,0,'lie');
    R(196,177,6,3,C.hair); R(203,177,11,3,C.ink); R(214,178,5,2,C.skin);   // 9S
    R(84,177,8,3,C.hair); R(78,178,7,2,C.hair); R(92,177,13,3,C.dgrey);    // A2
    drawPod(120,128,st,false); drawPod(238,122,st+2,true);
    // fireflies / petals
    for(const f of S_.fly){ f.x+=Math.sin(st*.6+f.p)*dt*6; f.y-=f.v*dt*.6;
      if(f.y<40)f.y=190,f.x=Math.random()*W;
      const tw=.4+.6*Math.max(0,Math.sin(st*2+f.p));
      g.fillStyle=`rgba(232,192,105,${tw*(.3+d*.7)})`; g.fillRect(f.x|0,f.y|0,1,1);}
    caption([
      [3,9,'"A FUTURE IS NOT GIVEN TO YOU."','POD 042'],
      [9.5,16,'"IT IS SOMETHING YOU MUST TAKE FOR YOURSELF."','POD 042'],
    ],st);
    if(st>18){ ctext("- FIN -",96,`rgba(239,234,222,${clamp((st-18)/2,0,.9)})`,1);
      if(st>21&&(st*1.2|0)%2)ctext("CLICK TO BEGIN AGAIN",H-10,C.grey,1); }
    if(st>14)musicVol=Math.max(.35,1-(st-14)*.04);
  }},
];

/* ---------------- title ---------------- */
function drawTitle(t){
  R(0,0,W,H,C.black);
  drawStars(t,1);
  R(300,30,18,18,C.bone); R(303,27,12,24,C.bone); R(297,33,24,12,C.bone);  // moon
  R(306,34,4,4,'#a8a292'); R(311,42,3,3,'#a8a292');
  drawLayer(farL,20,'#15131a'); drawLayer(midL,80,'#0f0e13');
  R(0,176,W,H-176,'#0b0a0e');
  ctext("NIER:AUTOMATA",78,C.white,2);
  ctext("16-BIT",104,C.bone,1);
  R(W/2-60,116,120,1,C.dgrey);
  if((t*1.6|0)%2)ctext("PRESS START",150,C.lgrey,1);
  ctext("A TRIBUTE IN PIXELS AND SQUARE WAVES",H-12,'#3f3b45',1);
}

/* ---------------- main loop ---------------- */
let last=0;
try{ localStorage.setItem('nier16_views',
  (+localStorage.getItem('nier16_views')||1)+1); }catch(e){}
const qp=new URLSearchParams(location.search);
if(qp.get('t')!==null){ state='film'; filmT=parseFloat(qp.get('t'))||0; }

function sceneAt(t){
  let acc=0;
  for(let i=0;i<SCN.length;i++){ if(t<acc+SCN[i].dur)return[i,t-acc]; acc+=SCN[i].dur; }
  return[SCN.length-1,t-acc+SCN[SCN.length-1].dur];
}
function frame(ts){
  requestAnimationFrame(frame);
  const dt=Math.min(.05,(ts-last)/1000)||.016; last=ts;
  if(state==='title'){ drawTitle(ts/1000); curSection='none'; return; }
  if(!window._frozen)filmT+=dt;
  const [i,st]=sceneAt(filmT), sc=SCN[i];
  if(i!==sceneIdx){ sceneIdx=i; S_={}; if(sc.init)sc.init(); }
  curSection=sc.sec;
  sc.draw(st,dt);
  // fades
  if(!sc.hardIn&&st<.6)R(0,0,W,H,`rgba(0,0,0,${1-st/.6})`);
  const rem=sc.dur-st;
  if(sc.dur<1e8&&rem<.6&&!(SCN[i+1]&&SCN[i+1].hardIn))R(0,0,W,H,`rgba(0,0,0,${1-rem/.6})`);
  // film grain
  for(let k=0;k<26;k++){g.fillStyle=Math.random()<.5?'rgba(255,255,255,.04)':'rgba(0,0,0,.06)';
    g.fillRect(Math.random()*W|0,Math.random()*H|0,1,1);}
}
requestAnimationFrame(frame);

addEventListener('pointerdown',()=>{
  if(state==='title'){
    initAudio(); if(ac.state==='suspended')ac.resume();
    state='film'; filmT=0; sceneIdx=-1; musicVol=1; syncSong(0); sfxChime();
  }else if(SCN[sceneIdx]&&SCN[sceneIdx].name==='dawn'){
    const st=sceneAt(filmT)[1];
    if(st>21){ state='title'; sceneIdx=-1; curSection='none'; musicVol=1; }
  }
});
window.seek=(s,fr)=>{state='film';filmT=s;sceneIdx=-1;window._frozen=!!fr;syncSong(s);};   // debug hook
addEventListener('keydown',e=>{           // debug: → skips scene
  if(e.key==='ArrowRight'&&state==='film'){
    let acc=0; for(let i=0;i<=sceneIdx;i++)acc+=SCN[i].dur; filmT=acc;
  }
});
</script>
