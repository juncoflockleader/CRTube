function parseMidi(u){
  const rd32=i=>((u[i]<<24|u[i+1]<<16|u[i+2]<<8|u[i+3])>>>0), rd16=i=>u[i]<<8|u[i+1];
  if(u[0]!==0x4D||u[1]!==0x54||u[2]!==0x68||u[3]!==0x64)return null;
  const ntrk=rd16(10), tpq=rd16(12);

    while(j<end){

      t+=v;

        do{b=u[j++];ln=(ln<<7)|(b&127);}while(b&128);
        if(mt===0x51)tempos.push({t,us:u[j]<<16|u[j+1]<<8|u[j+2]});
        j+=ln;
      }else if(s===0xF0||s===0xF7){ let ln=0; j++;
        do{b=u[j++];ln=(ln<<7)|(b&127);}while(b&128); j+=ln;
      }else{
        if(s&0x80){run=s;j++;}else s=run;
        const hi=s&0xF0;
        if(hi===0xC0||hi===0xD0)j+=1;
        else{ const p1=u[j],p2=u[j+1]; j+=2;
          if(hi===0x90&&p2>0)(on[p1]=on[p1]||[]).push({t,v:p2});
          else if(hi===0x80||(hi===0x90&&p2===0)){
            const q=(on[p1]||[]).shift(); if(q)raw.push({st:q.t,en:t,m:p1,v:q.v,tr});
          }
        }
      }
    }
    i=end;
  }
  tempos.sort((a,b)=>a.t-b.t);
  const seg=[]; let sec=0;
  for(let k=0;k<tempos.length;k++){
    if(k>0)sec+=(tempos[k].t-tempos[k-1].t)/tpq*tempos[k-1].us/1e6;
    seg.push({t:tempos[k].t,sec,us:tempos[k].us});
  }
  const toSec=t=>{let s=seg[0];for(const x of seg){if(x.t<=t)s=x;else break;}
    return s.sec+(t-s.t)/tpq*s.us/1e6;};
  const ev=raw.map(n=>({t:toSec(n.st),d:Math.max(.09,toSec(n.en)-toSec(n.st)),m:n.m,v:n.v/127,tr:n.tr}))
    .sort((a,b)=>a.t-b.t);

  const sum={},cnt={};

  const trks=Object.keys(cnt);
  const bassTrack=trks.length>1
    ? +trks.reduce((a,b)=>sum[a]/cnt[a]<=sum[b]/cnt[b]?a:b) : -1;
  const spb=seg[0].us/1e6;
  const dur=ev.reduce((m,e)=>Math.max(m,e.t+e.d),0)+spb;
  const uset=new Set(tempos.map(x=>x.us));
  return {ev,dur,spb,bassTrack,rubato:uset.size>2};

function midiReady(){
  window._midiOK=!!MIDI;
  if(!MIDI)return;
  window._midiInfo={notes:MIDI.ev.length,dur:MIDI.dur,bassTrack:MIDI.bassTrack,
    rubato:MIDI.rubato,src:MIDI.src};
  if(echoDelay)echoDelay.delayTime.value=MIDI.spb*.75;
}
(function loadMidi(){
  try{
    if(MIDI_B64&&MIDI_B64[0]!=='@'){
      const s=atob(MIDI_B64), u=new Uint8Array(s.length);
      for(let k=0;k<s.length;k++)u[k]=s.charCodeAt(k);
      MIDI=parseMidi(u); if(MIDI)MIDI.src='embedded';
    }
  }catch(e){MIDI=null;}
  if(MIDI){midiReady();return;}
  fetch('persona-4.mid')
    .then(r=>{if(!r.ok)throw 0;return r.arrayBuffer();})
    .then(b=>{ MIDI=parseMidi(new Uint8Array(b)); if(MIDI)MIDI.src='fetched'; midiReady(); })
    .catch(()=>{window._midiOK=false;});
})();

function pulseWave(d){
  const n=32, re=new Float32Array(n), im=new Float32Array(n);
  for(let i=1;i<n;i++)im[i]=(2/(i*Math.PI))*Math.sin(Math.PI*d*i);
  return ac.createPeriodicWave(re,im);
}
function initAudio(){
  if(ac)return;
  ac=new (window.AudioContext||window.webkitAudioContext)();
  master=ac.createGain(); master.gain.value=.55; master.connect(ac.destination);
  filt=ac.createBiquadFilter(); filt.type='lowpass'; filt.frequency.value=12000;
  musicBus=ac.createGain(); musicBus.connect(filt); filt.connect(master);
  echoIn=ac.createGain(); const dl=echoDelay=ac.createDelay(1);
  dl.delayTime.value=MIDI?MIDI.spb*.75:.45;

  echoIn.connect(dl); dl.connect(fb); fb.connect(dl); dl.connect(wet); wet.connect(musicBus);

  const d=noiseBuf.getChannelData(0); for(let i=0;i<d.length;i++)d[i]=Math.random()*2-1;

function env(t,dur,vol,rel,sus){
  const gn=ac.createGain(); gn.gain.setValueAtTime(.0001,t);
  gn.gain.linearRampToValueAtTime(vol,t+.012);
  if(sus===false){ gn.gain.exponentialRampToValueAtTime(.0008,t+dur); }
  else{ gn.gain.setValueAtTime(vol,t+Math.max(.012,dur-.05));
        gn.gain.exponentialRampToValueAtTime(.0008,t+dur+(rel||.06)); }
  return gn;
}
function voice(t,midi,dur,vol,o){
  o=o||{};
  const osc=ac.createOscillator();
  if(o.wave==='tri')osc.type='triangle';
  else if(o.wave==='p25')osc.setPeriodicWave(pw25);
  else if(o.wave==='p125')osc.setPeriodicWave(pw125);
  else osc.type='square';
  osc.frequency.value=nfr(midi);
  if(o.detune)osc.detune.value=o.detune;
  if(o.vib){
    const lfo=ac.createOscillator(),lg=ac.createGain();
    lfo.frequency.value=5; lg.gain.setValueAtTime(0,t);
    lg.gain.linearRampToValueAtTime(nfr(midi)*.009,t+.3);
    lfo.connect(lg); lg.connect(osc.frequency); lfo.start(t); lfo.stop(t+dur+.2);
  }
  const gn=env(t,dur,vol,o.rel,o.sus);
  osc.connect(gn); gn.connect(musicBus);
  if(o.echo){const s=ac.createGain();s.gain.value=o.echo;gn.connect(s);s.connect(echoIn);}
  osc.start(t); osc.stop(t+dur+(o.rel||.12));
}
function noiseHit(t,vol,dur,type,f,q){
  const src=ac.createBufferSource(); src.buffer=noiseBuf;
  src.playbackRate.value=.9+Math.random()*.2;
  const bf=ac.createBiquadFilter(); bf.type=type; bf.frequency.value=f; bf.Q.value=q||.8;
  const gn=env(t,dur,vol,.02,false);
  src.connect(bf); bf.connect(gn); gn.connect(master);
  src.start(t); src.stop(t+dur+.05);
}
function kick(t){                                   // soft lo-fi kick
  const o=ac.createOscillator(); o.type='sine';
  o.frequency.setValueAtTime(95,t); o.frequency.exponentialRampToValueAtTime(42,t+.1);
  const gn=env(t,.12,.17,.02,false); o.connect(gn); gn.connect(master); o.start(t); o.stop(t+.16);
}
function playMidiNote(e,at){
  const S=SECTIONS[curSection]||{}; const mv=musicVol*(S.vol||1);
  const vol=.2*(.35+.65*e.v);
  const isBass=MIDI.bassTrack>=0 ? e.tr===MIDI.bassTrack : e.m<52;
  if(isBass) voice(at,e.m,e.d,vol*(e.m<48?1.05:.72)*mv,{wave:'tri'});
  else voice(at,e.m,e.d,vol*.75*mv,{vib:e.d>.5,echo:S.echo||.45});
}
function tickMidi(){
  const now=ac.currentTime, horizon=now+.4;
  const S=SECTIONS[curSection]||{};
  filt.frequency.setTargetAtTime(S.lp||12000,now,.3);
  let guard=0;
  while(guard++<2000){
    if(midiPtr<MIDI.ev.length){
      const e=MIDI.ev[midiPtr], at=songStart+e.t;
      if(at>=horizon)break;
      midiPtr++;
      if(at<now-.05)continue;
      playMidiNote(e,at);
    }else{
      if(songStart+MIDI.dur>=horizon)break;
      songStart+=MIDI.dur; midiPtr=0; beatPtr=0;
    }
  }
  if(MIDI.rubato)return;
  const e8=MIDI.spb/2;                              // soft lo-fi drums
  while(songStart+beatPtr*e8<horizon){
    const at=songStart+beatPtr*e8, b8=beatPtr; beatPtr++;
    if(at<now||!S.dr)continue;
    if(b8%8===0)kick(at);
    if(b8%8===4)noiseHit(at,.05,.09,'bandpass',2300,1.4);   // rim-ish
    if(b8%2===1)noiseHit(at,.018,.02,'highpass',8000);      // brushed hat

const stars=[]; { const r=mulberry(5); for(let i=0;i<60;i++)stars.push({x:r()*W|0,y:r()*100|0,p:r()*6}); }
function drawStars(t,dim){
  for(const s of stars){ const tw=Math.sin(t*1.5+s.p)>.2?1:.4;
    g.fillStyle=`rgba(225,220,210,${.5*tw*(dim||1)})`; g.fillRect(s.x,s.y,1,1);}
}
function bands(cs,y0,y1){
  const n=cs.length,hh=(y1-y0)/n;
  for(let i=0;i<n;i++)R(0,y0+i*hh,W,Math.ceil(hh),cs[i]);
}
function caption(cues,st){
  for(const q of cues)if(st>=q[0]&&st<q[1]){
    R(0,H-26,W,26,'rgba(8,7,10,.55)');
    if(q[3]){ ctext(q[3],H-22,'#a89a70',1); ctext(q[2],H-13,C.white,1); }
    else ctext(q[2],H-17,C.bone,1);
  }
}
function ring(cx,cy,rr,sq,col){
  const n=Math.max(12,rr*.8)|0; g.fillStyle=col;
  for(let a=0;a<n;a++){const th=a/n*6.2832;
    g.fillRect(cx+Math.cos(th)*rr|0,cy+Math.sin(th)*rr*sq|0,1,1);}
}
function pole(x,gy){                                 // telephone pole + arms
  R(x,gy-74,3,74,'#3a352e'); R(x-6,gy-70,15,2,'#3a352e'); R(x-4,gy-64,11,2,'#3a352e');
}
function wire(x1,y1,x2,y2,sagg){
  g.fillStyle='rgba(30,28,26,.8)';
  for(let i=0;i<=16;i++){const t=i/16;
    const x=lerp(x1,x2,t), y=lerp(y1,y2,t)+Math.sin(t*3.14)*sagg;
    g.fillRect(x|0,y|0,1,1);}
}

function drawYu(x,y,t,walk){
  x|=0;y|=0; const ph=t*7.5, s1=walk?Math.sin(ph):0, s2=walk?Math.sin(ph+Math.PI):0;
  R(x-1+(s1*2|0),y-11,3,6,C.uni); R(x-1+(s2*2|0),y-11,3,6,'#1c1b24');
  R(x-1+(s1*2|0),y-5,3,5,'#2c2b35'); R(x-1+(s2*2|0),y-5,3,5,'#2c2b35');
  R(x-3,y-14,8,3,C.uni);
  R(x-2,y-21,6,7,C.uni); R(x-2,y-20,1,4,'#3a3944');       // collar hint
  R(x+3+(s2*1|0),y-19,2,5,C.uni);
  R(x-3,y-27,8,6,C.hairYu); R(x-4,y-24,2,3,C.hairYu);     // grey bowl
  R(x+2,y-24,3,3,C.skin);
}
function drawYukiko(x,y,t,pose){
  x|=0;y|=0;
  const walk=pose==='walk', ph=t*7.5+2, s1=walk?Math.sin(ph):0, s2=walk?Math.sin(ph+Math.PI):0;
  if(pose==='kimono'||pose==='yukata'){
    const robe=pose==='kimono'?'#c9425a':'#d86a6a', robe2=pose==='kimono'?'#8a2438':'#a84848';
    R(x-4,y-8,9,8,robe); R(x-3,y-1,7,1,robe2);
    R(x-3,y-16,7,8,robe); R(x-4,y-13,2,6,robe2); R(x+3,y-13,2,6,robe2);
    R(x-1,y-13,3,2,C.p4yellow);                          // obi
    R(x-3,y-22,8,6,C.hairY); R(x-4,y-18,2,7,C.hairY); R(x+4,y-18,2,6,C.hairY);
    R(x-2,y-23,6,1,C.red);
    R(x+2,y-20,3,3,C.skin);
    return;
  }
  if(pose==='sit'||pose==='laugh'){
    const rock=pose==='laugh'?(Math.sin(t*10)*1|0):0;
    R(x-4,y-6,9,6,'#2a2932');                            // skirt/legs folded
    R(x-3,y-13+rock,7,8,C.red);                          // cardigan
    R(x-4+rock,y-11,2,5,C.red2);
    R(x-3,y-19+rock,8,6,C.hairY); R(x-4,y-15+rock,2,6,C.hairY); R(x+4,y-15+rock,2,5,C.hairY);
    R(x-2,y-20+rock,6,1,C.red);
    R(x+2,y-17+rock,3,3,C.skin);
    if(pose==='laugh')R(x+2+rock,y-14,3,2,C.skin);       // hand at mouth
    return;
  }
  if(pose==='wave'){
    R(x-2,y-11,3,6,'#1c1b24'); R(x+1,y-11,3,6,'#1c1b24');
    R(x-3,y-14,8,3,'#2a2932');
    R(x-2,y-21,7,7,C.red); R(x-3,y-19,2,5,C.red2);
    const wv=(Math.sin(t*5)*2|0);
    R(x+4,y-25+wv,2,5,C.red); R(x+4,y-27+wv,3,2,C.skin);  // waving arm
    R(x-3,y-27,8,6,C.hairY); R(x-4,y-23,2,8,C.hairY); R(x+4,y-23,2,6,C.hairY);
    R(x-2,y-28,6,1,C.red);
    R(x+2,y-25,3,3,C.skin);
    return;
  }
  // walk / stand — school: red cardigan, black skirt, tights
  R(x-1+(s1*2|0),y-11,3,6,'#1c1b24'); R(x-1+(s2*2|0),y-11,3,6,'#14131b');
  R(x-3,y-14,8,3,'#2a2932');
  R(x-2,y-21,6,7,C.red); R(x-3,y-19,2,5,C.red2);
  R(x+3+(s2*1|0),y-19,2,5,C.red);
  R(x-3,y-27,8,6,C.hairY); R(x-4,y-23,2,8,C.hairY); R(x+4,y-23,2,7,C.hairY);
  R(x-2,y-28,6,1,C.red);                                 // headband
  R(x+2,y-25,3,3,C.skin);
}

  R(x-1,y-10,2,5,'#4a4438'); R(x+1,y-10,2,5,'#4a4438');

function drawTV(x,y,w,h,t,showGirl){
  x|=0;y|=0;
  R(x-2,y-2,w+4,h+4,'#2a2620'); R(x-1,y+h+2,w+2,2,'#1a1712');
  R(x+w/2-6,y-6,2,5,'#2a2620'); R(x+w/2+4,y-6,2,5,'#2a2620');
  R(x,y,w,h,C.tvdim);
  // quiet static: sparse, low-contrast, confined to the screen
  const rr=mulberry((t*7|0)+3);
  g.fillStyle='rgba(160,180,210,.28)';
  for(let k=0;k<w*h/22;k++)g.fillRect(x+rr()*w|0,y+rr()*h|0,1,1);
  if(showGirl){
    const gx=x+w/2, gy=y+h;
    g.fillStyle='rgba(200,210,225,.4)';
    g.fillRect(gx-4,gy-h+5,8,5);                          // blurred hair
    g.fillRect(gx-3,gy-h+10,6,h-16);                      // blurred body
    g.fillStyle='rgba(200,210,225,.18)';
    g.fillRect(gx-6,gy-h+4,12,h-8);                       // halo of blur
  }
  g.fillStyle='rgba(122,154,201,.12)';                    // glow spill
  g.fillRect(x-8,y-6,w+16,h+14);
}

    for(const f of S_.fw){
      f.age+=dt;
      const rr=f.age*26, al=clamp(1-f.age/2.2,0,1)*.55;
      if(al>0){ ring(f.x,f.y,rr,.9,`rgba(${hex(f.c)[0]},${hex(f.c)[1]},${hex(f.c)[2]},${al})`);
        if(f.age>.8)ring(f.x,f.y,rr*.6,.9,`rgba(240,230,200,${al*.6})`);}
    }
    S_.fw=S_.fw.filter(f=>f.age<2.4);
    // hills
    g.fillStyle='#0f0d1c';
    for(let x=-10;x<W+10;x+=8){const h=16+Math.sin(x*.03+1)*7;g.fillRect(x,120-h,8,h);}
    R(0,120,W,96,'#171322');
    // lantern strings
    for(let k=0;k<2;k++){
      wire(0,130+k*8,W,126+k*8,10);
      for(let i=0;i<9;i++){
        const lx=i*44+18+k*20, ly=130+k*8+Math.sin((lx/W)*3.14)*10;
        const gl=.55+.2*Math.sin(st*1.4+i+k);
        R(lx,ly,5,7,`rgba(232,150,60,${gl})`); R(lx+1,ly-2,3,2,'#2c1e18');
      }
    }
    // stalls
    for(const [sx,aw] of [[20,'#b84a3a'],[120,'#3a6a8a'],[300,'#7a8a3a']]){
      R(sx,150,56,36,'#3a2c20'); R(sx-2,146,60,7,aw);
      for(let a=0;a<60;a+=8)R(sx-2+a,151,4,2,aw);
      g.fillStyle='rgba(232,180,100,.4)';g.fillRect(sx+6,158,44,16);
    }
    // friends in the background
    drawChie(150,186,st); drawYosuke(168,186,st);
    // the two of them, front
    drawYukiko(232,196,st,'yukata');
    drawYu(210,196,0,false);
    caption([
      [3,8,'"I\'M STAYING IN INABA. NOT BECAUSE I HAVE TO -"','YUKIKO'],
      [8,11.5,'"- BECAUSE I WANT TO."','YUKIKO'],
      [13,16.5,'"...AND BECAUSE YOU\'RE HERE."','YUKIKO'],
    ],st);
  }},
/* ---- 7 SPRING ---- */
{ name:'spring', dur:1e9, sec:'outro',
  init(){ setAmb(.015); S_.petals=[]; const r=mulberry(21);
    for(let i=0;i<40;i++)S_.petals.push({x:r()*W,y:r()*H,vx:8+r()*10,vy:4+r()*6,p:r()*7});
    S_.train=0; S_.horn=false; },
  draw(st,dt){
    const lift=clamp(st/18,0,1);
    bands([mix('#b8c9d8','#8ab8e0',lift),mix('#c2d0da','#9cc2e4',lift),
      mix('#ccd8e0','#b0cce8',lift)],0,100);
    // fog lifting off the hills
    g.fillStyle='#7a9a6a';
    for(let x=-10;x<W+10;x+=8){const h=22+Math.sin(x*.025+1)*9;g.fillRect(x,100-h,8,h);}
    g.fillStyle=`rgba(225,222,215,${.55*(1-lift)})`;
    for(let x=0;x<W;x+=6)g.fillRect(x,80+Math.sin(x*.05)*4|0,6,14);
    // spring field between the hills and the tracks
    R(0,100,W,32,mix('#8aa678','#7a9a68',lift));
    g.fillStyle='rgba(240,205,215,.5)';
    for(let i=0;i<14;i++)g.fillRect((i*29+7)%W,104+(i*13)%24,2,1);   // petals in the grass
    // track bed behind the platform
    R(0,132,W,24,'#5c564c');
    R(0,150,W,3,'#8a857a'); R(0,153,W,3,'#3a362e');          // rail + shadow
    // the one-car local pulls out (rightward, then gone)
    if(st<9){
      const tx=40+Math.pow(st/9,2)*420;
      if(!S_.horn&&st>.8){S_.horn=true;sfxTrain();}
      R(tx,104,120,44,'#e8e0c9');
      R(tx,104,120,8,'#c9b878');
      R(tx+6,116,20,16,'#3a4a5c'); R(tx+34,116,20,16,'#3a4a5c');
      R(tx+62,116,20,16,'#3a4a5c'); R(tx+90,116,20,16,'#3a4a5c');
      R(tx,142,120,6,'#8a8478'); R(tx-4,138,6,8,'#2c2a24');
      ring(tx+18,148,4,.9,'#1a1814'); ring(tx+98,148,4,.9,'#1a1814');
      // yu at the last window, hand up
      if(st<6){R(tx+94,118,4,4,C.hairYu);R(tx+99,124,3,2,C.skin);}
    }
    // platform, foreground
    R(0,156,W,3,'#c9c4b8'); R(0,159,W,2,'#c9b878');          // edge + safety line
    R(0,161,W,H-161,'#8a8478');
    for(let i=0;i<13;i++)R(i*32,161,1,H-161,'rgba(0,0,0,.12)');
    R(0,H-10,W,10,'#767065');
    // yukiko on the platform, waving until the train is gone
    drawYukiko(150,H-14,st,st<10?'wave':'stand');
    // petals
    for(const p of S_.petals){
      p.x+=p.vx*dt*.6+Math.sin(st+p.p)*dt*6; p.y+=p.vy*dt*.4;
      if(p.x>W||p.y>H){p.x=-4;p.y=Math.random()*140;}
      g.fillStyle=(p.p>3.5)?'rgba(240,205,215,.8)':'rgba(230,185,200,.6)';
      g.fillRect(p.x|0,p.y|0,2,1);
    }
    caption([
      [4,9,"SPRING CAME. THE FOG NEVER RETURNED."],
    ],st);
    if(st>11){ ctext("- SEE YOU AGAIN -",92,`rgba(239,234,222,${clamp((st-11)/2,0,.9)})`,1);
      if(st>14&&(st*1.2|0)%2)ctext("CLICK TO BEGIN AGAIN",H-10,'#6a7484',1); }
    if(st>10)musicVol=Math.max(.4,1-(st-10)*.04);
  }},
];

/* ---------------- title ---------------- */
function drawTitle(t){
  R(0,0,W,H,'#0c0b12');
  // a dark room, one old TV
  R(0,170,W,46,'#161420'); R(0,168,W,3,'#201c2a');
  drawTV(166,108,52,40,t,false);
  drawText("00:00",186,84,'rgba(190,195,210,.35)',1);
  ctext("PERSONA 4",52,C.p4yellow,2);
  ctext("16-BIT · YUKIKO",78,C.bone,1);
  R(W/2-60,90,120,1,'#2c2838');
  if((t*1.6|0)%2)ctext("PRESS START",196,'#9a90a8',1);
  ctext("A TRIBUTE IN PIXELS AND SQUARE WAVES",H-6,'#332e40',1);
}

/* ---------------- main loop ---------------- */
let last=0;
try{ localStorage.setItem('p416_views',
  (+localStorage.getItem('p416_views')||1)+1); }catch(e){}
const qp=new URLSearchParams(location.search);
if(qp.get('t')!==null){ state='film'; filmT=parseFloat(qp.get('t'))||0; }

function sceneAt(t){
  let acc=0;
  for(let i=0;i<SCN.length;i++){ if(t<acc+SCN[i].dur)return[i,t-acc]; acc+=SCN[i].dur; }
  return[SCN.length-1,t-acc+SCN[SCN.length-1].dur];
}
function frame(ts){
  requestAnimationFrame(frame);
  const dt=Math.min(.05,(ts-last)/1000)||.016; last=ts;
  if(state==='title'){ drawTitle(ts/1000); curSection='none'; return; }
  if(!window._frozen)filmT+=dt;
  const [i,st]=sceneAt(filmT), sc=SCN[i];
  if(i!==sceneIdx){ sceneIdx=i; S_={}; if(sc.init)sc.init(); }
  curSection=sc.sec;
  sc.draw(st,dt);
  if(st<.6)R(0,0,W,H,`rgba(0,0,0,${1-st/.6})`);
  const rem=sc.dur-st;
  if(sc.dur<1e8&&rem<.6)R(0,0,W,H,`rgba(0,0,0,${1-rem/.6})`);
  for(let k=0;k<26;k++){g.fillStyle=Math.random()<.5?'rgba(255,255,255,.04)':'rgba(0,0,0,.06)';
    g.fillRect(Math.random()*W|0,Math.random()*H|0,1,1);}
}
requestAnimationFrame(frame);

addEventListener('pointerdown',()=>{
  if(state==='title'){
    initAudio(); if(ac.state==='suspended')ac.resume();
    state='film'; filmT=0; sceneIdx=-1; musicVol=1; syncSong(0); sfxChime();
  }else if(SCN[sceneIdx]&&SCN[sceneIdx].name==='spring'){
    const st=sceneAt(filmT)[1];
    if(st>14){ state='title'; sceneIdx=-1; curSection='none'; musicVol=1; if(ambGain)setAmb(0); }
  }
});
window.seek=(s,fr)=>{state='film';filmT=s;sceneIdx=-1;window._frozen=!!fr;syncSong(s);};
addEventListener('keydown',e=>{
  if(e.key==='ArrowRight'&&state==='film'){
    let acc=0; for(let i=0;i<=sceneIdx;i++)acc+=SCN[i].dur; filmT=acc;
  }
});
</script>
