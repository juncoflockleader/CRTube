function parseMidi(u){

        if(mt===0x51)tempos.push({t,us:u[j]<<16|u[j+1]<<8|u[j+2]});
        j+=ln;
      }else if(s===0xF0||s===0xF7){ let ln=0; j++;
        do{b=u[j++];ln=(ln<<7)|(b&127);}while(b&128); j+=ln;
      }else{
        if(s&0x80){run=s;j++;}else s=run;
        const hi=s&0xF0;
        if(hi===0xC0||hi===0xD0)j+=1;
        else{ const p1=u[j],p2=u[j+1]; j+=2;
          if(hi===0x90&&p2>0)(on[p1]=on[p1]||[]).push({t,v:p2});
          else if(hi===0x80||(hi===0x90&&p2===0)){
            const q=(on[p1]||[]).shift(); if(q)raw.push({st:q.t,en:t,m:p1,v:q.v,tr});
          }
        }
      }
    }
    i=end;
  }
  tempos.sort((a,b)=>a.t-b.t);
  const seg=[]; let sec=0;
  for(let k=0;k<tempos.length;k++){
    if(k>0)sec+=(tempos[k].t-tempos[k-1].t)/tpq*tempos[k-1].us/1e6;
    seg.push({t:tempos[k].t,sec,us:tempos[k].us});
  }
  const toSec=t=>{let s=seg[0];for(const x of seg){if(x.t<=t)s=x;else break;}
    return s.sec+(t-s.t)/tpq*s.us/1e6;};
  const ev=raw.map(n=>({t:toSec(n.st),d:Math.max(.09,toSec(n.en)-toSec(n.st)),m:n.m,v:n.v/127,tr:n.tr}))
    .sort((a,b)=>a.t-b.t);
  if(!ev.length)return null;
  const sum={},cnt={};
  for(const e of ev){sum[e.tr]=(sum[e.tr]||0)+e.m;cnt[e.tr]=(cnt[e.tr]||0)+1;}
  const trks=Object.keys(cnt);
  const bassTrack=trks.length>1
    ? +trks.reduce((a,b)=>sum[a]/cnt[a]<=sum[b]/cnt[b]?a:b) : -1;
  const spb=seg[0].us/1e6;
  const dur=ev.reduce((m,e)=>Math.max(m,e.t+e.d),0)+spb*2;
  const uset=new Set(tempos.map(x=>x.us));
  return {ev,dur,spb,bassTrack,rubato:uset.size>2};
}

function midiReady(){
  window._midiOK=!!MIDI;
  if(!MIDI)return;
  window._midiInfo={notes:MIDI.ev.length,dur:MIDI.dur,bassTrack:MIDI.bassTrack,
    rubato:MIDI.rubato,src:MIDI.src};
  if(echoDelay)echoDelay.delayTime.value=MIDI.spb*.75;
}
(function loadMidi(){
  try{
    if(MIDI_B64&&MIDI_B64[0]!=='@'){
      const s=atob(MIDI_B64), u=new Uint8Array(s.length);
      for(let k=0;k<s.length;k++)u[k]=s.charCodeAt(k);
      MIDI=parseMidi(u); if(MIDI)MIDI.src='embedded';
    }
  }catch(e){MIDI=null;}
  if(MIDI){midiReady();return;}
  fetch('kaine-escape.mid')
    .then(r=>{if(!r.ok)throw 0;return r.arrayBuffer();})
    .then(b=>{ MIDI=parseMidi(new Uint8Array(b)); if(MIDI)MIDI.src='fetched'; midiReady(); })
    .catch(()=>{window._midiOK=false;});
})();

function pulseWave(d){
  const n=32, re=new Float32Array(n), im=new Float32Array(n);
  for(let i=1;i<n;i++)im[i]=(2/(i*Math.PI))*Math.sin(Math.PI*d*i);
  return ac.createPeriodicWave(re,im);
}
function initAudio(){
  if(ac)return;
  ac=new (window.AudioContext||window.webkitAudioContext)();
  master=ac.createGain(); master.gain.value=.52; master.connect(ac.destination);
  filt=ac.createBiquadFilter(); filt.type='lowpass'; filt.frequency.value=12000;
  musicBus=ac.createGain(); musicBus.connect(filt); filt.connect(master);
  echoIn=ac.createGain(); const dl=echoDelay=ac.createDelay(1);
  dl.delayTime.value=MIDI?MIDI.spb*.75:.35;
  const fb=ac.createGain(); fb.gain.value=.3; const wet=ac.createGain(); wet.gain.value=.22;
  echoIn.connect(dl); dl.connect(fb); fb.connect(dl); dl.connect(wet); wet.connect(musicBus);
  noiseBuf=ac.createBuffer(1,ac.sampleRate,ac.sampleRate);
  const d=noiseBuf.getChannelData(0); for(let i=0;i<d.length;i++)d[i]=Math.random()*2-1;
  windGain=ac.createGain(); windGain.gain.value=0; windGain.connect(master);
  const wn=ac.createBufferSource(); wn.buffer=noiseBuf; wn.loop=true;
  const wf=ac.createBiquadFilter(); wf.type='bandpass'; wf.frequency.value=600; wf.Q.value=.6;
  wn.connect(wf); wf.connect(windGain); wn.start();
  const lfo=ac.createOscillator(), lg=ac.createGain();     // slow gusts
  lfo.frequency.value=.09; lg.gain.value=.008;
  lfo.connect(lg); lg.connect(windGain.gain); lfo.start();
  pw25=pulseWave(.25); pw125=pulseWave(.125);
  musicOn=true;
  setInterval(tick,80);
}
function env(t,dur,vol,rel,sus){
  const gn=ac.createGain(); gn.gain.setValueAtTime(.0001,t);
  gn.gain.linearRampToValueAtTime(vol,t+.012);
  if(sus===false){ gn.gain.exponentialRampToValueAtTime(.0008,t+dur); }
  else{ gn.gain.setValueAtTime(vol,t+Math.max(.012,dur-.05));
        gn.gain.exponentialRampToValueAtTime(.0008,t+dur+(rel||.06)); }
  return gn;
}
function voice(t,midi,dur,vol,o){
  o=o||{};
  const osc=ac.createOscillator();
  if(o.wave==='tri')osc.type='triangle';
  else if(o.wave==='p25')osc.setPeriodicWave(pw25);
  else if(o.wave==='p125')osc.setPeriodicWave(pw125);
  else osc.type='square';
  osc.frequency.value=nfr(midi);
  if(o.detune)osc.detune.value=o.detune;
  if(o.vib){
    const lfo=ac.createOscillator(),lg=ac.createGain();
    lfo.frequency.value=5.4; lg.gain.setValueAtTime(0,t);
    lg.gain.linearRampToValueAtTime(nfr(midi)*.01,t+.25);
    lfo.connect(lg); lg.connect(osc.frequency); lfo.start(t); lfo.stop(t+dur+.2);
  }
  const gn=env(t,dur,vol,o.rel,o.sus);
  osc.connect(gn); gn.connect(musicBus);
  if(o.echo){const s=ac.createGain();s.gain.value=o.echo;gn.connect(s);s.connect(echoIn);}
  osc.start(t); osc.stop(t+dur+(o.rel||.12));
}
function noiseHit(t,vol,dur,type,f,q){
  const src=ac.createBufferSource(); src.buffer=noiseBuf;
  src.playbackRate.value=.9+Math.random()*.2;
  const bf=ac.createBiquadFilter(); bf.type=type; bf.frequency.value=f; bf.Q.value=q||.8;
  const gn=env(t,dur,vol,.02,false);
  src.connect(bf); bf.connect(gn); gn.connect(master);
  src.start(t); src.stop(t+dur+.05);
}
function kick(t){
  noiseHit(t,.14,.08,'lowpass',180);
  const o=ac.createOscillator(); o.type='sine';
  o.frequency.setValueAtTime(120,t); o.frequency.exponentialRampToValueAtTime(45,t+.11);
  const gn=env(t,.13,.26,.02,false); o.connect(gn); gn.connect(master); o.start(t); o.stop(t+.18);
}
function playMidiNote(e,at){
  const S=SECTIONS[curSection]||{}; const mv=musicVol*(S.vol||1);
  let det=0;
  if(S.skip&&Math.random()<S.skip)return;
  if(S.det)det=(Math.random()-.5)*2*S.det;
  const vol=.19*(.35+.65*e.v);
  const isBass=MIDI.bassTrack>=0 ? e.tr===MIDI.bassTrack : e.m<52;
  if(isBass) voice(at,e.m,e.d,vol*(e.m<48?1.05:.72)*mv,{wave:'tri',detune:det});
  else{
    voice(at,e.m,e.d,vol*.75*mv,{vib:e.d>.5,echo:S.echo||.4,detune:det});
    if(S.oct)voice(at,e.m+12,e.d,vol*.16*mv,{wave:'p25',echo:.4});
  }
}
function tickMidi(){
  const now=ac.currentTime, horizon=now+.4;
  const S=SECTIONS[curSection]||{};
  filt.frequency.setTargetAtTime(S.lp||12000,now,.3);
  let guard=0;
  while(guard++<4000){
    if(midiPtr<MIDI.ev.length){
      const e=MIDI.ev[midiPtr], at=songStart+e.t;
      if(at>=horizon)break;
      midiPtr++;
      if(at<now-.05)continue;
      playMidiNote(e,at);
    }else{
      if(songStart+MIDI.dur>=horizon)break;
      songStart+=MIDI.dur; midiPtr=0; beatPtr=0;
    }
  }
  if(MIDI.rubato)return;
  const e8=MIDI.spb/2;                      // drums, battle scenes only
  while(songStart+beatPtr*e8<horizon){
    const at=songStart+beatPtr*e8, b8=beatPtr; beatPtr++;
    if(at<now||!S.dr)continue;
    if(b8%8===0||b8%8===6)kick(at);
    if(b8%8===4)noiseHit(at,.12,.1,'bandpass',1900,1.2);
    if(b8%2===1)noiseHit(at,.03,.025,'highpass',7500);
  }
}
function tick(){ if(musicOn&&MIDI&&state==='film')tickMidi(); }
function syncSong(t){ if(ac&&MIDI){ songStart=ac.currentTime-(t%MIDI.dur); midiPtr=0; beatPtr=0; } }
function sfxSlash(){ if(!ac)return; noiseHit(ac.currentTime,.05,.07,'highpass',3200,1.5); }
function sfxCrack(){ if(!ac)return; noiseHit(ac.currentTime,.1,.15,'lowpass',900); }
function sfxChime(){ if(!ac)return; const t=ac.currentTime;
  voice(t,77,2.2,.07,{wave:'tri',echo:.8,sus:false,rel:.5});
  voice(t+.35,70,2,.05,{wave:'tri',echo:.8,sus:false,rel:.5}); }
function setWind(v){ if(windGain)windGain.gain.setTargetAtTime(v,ac.currentTime,1); }

const stars=[]; { const r=mulberry(5); for(let i=0;i<70;i++)stars.push({x:r()*W|0,y:r()*105|0,p:r()*6}); }
function drawStars(t,dim){
  for(const s of stars){ const tw=Math.sin(t*1.5+s.p)>.2?1:.4;
    g.fillStyle=`rgba(215,212,225,${.5*tw*(dim||1)})`; g.fillRect(s.x,s.y,1,1);}
}
function bands(cs,y0,y1){
  const n=cs.length,hh=(y1-y0)/n;
  for(let i=0;i<n;i++)R(0,y0+i*hh,W,Math.ceil(hh),cs[i]);
}
function caption(cues,st){
  for(const q of cues)if(st>=q[0]&&st<q[1]){
    R(0,H-26,W,26,'rgba(6,5,10,.55)');
    if(q[3]){ ctext(q[3],H-22,'#9a90a8',1); ctext(q[2],H-13,C.white,1); }
    else ctext(q[2],H-17,C.bone,1);
  }
}
function walkway(x,y,w,broken){          // plank bridge segment
  R(x,y,w,3,C.plank); R(x,y+3,w,1,C.plank2);
  for(let i=4;i<w-2;i+=9)R(x+i,y+1,1,3,C.plank2);
  if(!broken){ R(x,y-9,1,9,C.rope); R(x+w-1,y-9,1,9,C.rope); R(x,y-9,w,1,C.rope); }
}
function hut(x,y,w,h,lit){                // aerie hut clinging to cliff
  R(x,y-h,w,h,'#2f2b38'); R(x-1,y-h-3,w+2,4,'#241f2e');
  R(x+(w>>1)-1,y-5,3,5,lit?'#3a3344':'#191622');
  if(lit)R(x+2,y-h+3,2,2,'#e8c06955');
}

function drawKaine(x,y,t,pose,skip){
  x|=0;y|=0; const S=skip||(()=>false); let i=0;
  const px=(dx,dy,w,h,c)=>{ if(!S(i++))R(x+dx,y+dy,w,h,c); };
  const run=pose==='run'||pose==='slash';
  const ph=t*(run?16:7.5), s1=Math.sin(ph), s2=Math.sin(ph+Math.PI);
  if(pose==='lie'){
    px(-10,-4,8,3,C.hairK); px(-3,-4,12,4,C.white); px(9,-3,6,3,C.skin);
    px(-2,-1,10,1,C.band);
    return;
  }
  if(pose==='kneel'){
    px(-3,-2,9,2,C.skin); px(2,-8,4,7,C.white);
    px(-4,-13,8,6,C.white); px(-5,-9,3,5,C.band);
    px(-4,-19,9,6,C.hairK); px(-5,-14,3,2,C.hairK);
    px(2,-16,3,2,C.skin);
    return;
  }
  // legs — right skin, left bandaged
  const l1=run?(s1*4|0):(s1*2|0), l2=run?(s2*4|0):(s2*2|0);
  const lift1=run&&s1>0?2:0, lift2=run&&s2>0?2:0;
  px(-1+l1,-12,3,7-lift1,C.skin); px(-1+l1,-5+ (run?lift1:0),3,5-lift1,C.white);
  px(-1+l2,-12,3,7-lift2,C.band); px(-1+l2,-5+(run?lift2:0),3,5-lift2,C.band);
  // hips / shorts

function drawHook(bx,by,t,rise){        // the giant lizard shade, rising from the chasm
  if(rise<=0)return;

  for(let i=0;i<12;i++){
    const yy=(by-10-i*9*rise)|0;
    const xx=(bx-9+Math.pow(i/11,2)*46+sway*(i/11))|0;
    g.fillRect(xx,yy,(21-i*.6)|0,12);
  }
  const hx=(bx+37+sway)|0, hy=(by-10-11*9*rise)|0;
  const jaw=rise>.85?((Math.sin(t*1.8)>0)?3:2):1;   // jaw drifts open, slowly
  // skull, brow spines, long snout, lower jaw
  g.fillRect(hx-6,hy-14,26,16);
  for(let k=0;k<4;k++)g.fillRect(hx-4+k*6,hy-18+((k*3)&3),3,5);
  g.fillRect(hx+18,hy-10,26,8);
  g.fillRect(hx+16,hy+jaw,23,5);
  // teeth
  g.fillStyle=C.bone;
  for(let k=0;k<5;k++)g.fillRect(hx+21+k*4,hy-3,1,2);
  for(let k=0;k<4;k++)g.fillRect(hx+23+k*4,hy+jaw,1,1);
  // lantern eye
  g.fillStyle='rgba(232,192,105,.35)'; g.fillRect(hx+2,hy-11,7,6);
  g.fillStyle=C.shadeEye; g.fillRect(hx+4,hy-10,4,3);
  // foreclaw hauling over the chasm lip
  g.fillStyle=C.shade;
  g.fillRect(bx+26,by-72*rise|0,7,26);
  for(let k=0;k<3;k++)g.fillRect(bx+24+k*4,(by-72*rise+24)|0,2,5);
  // shade-wisps shedding off the neck
  g.fillStyle='rgba(138,92,201,.45)';
  for(let k=0;k<8;k++){
    const wy=(by-20-k*11*rise+Math.sin(t*2+k)*3)|0;
    g.fillRect((bx-6+((k*29)%38))|0,wy,1,1);
  }
}

    }
    // kaine, still, wind in the bandages
    drawKaine(192,168,st*.3,'stand');
    const fl=(Math.sin(st*1.3)*2)|0;
    R(186+fl,158,3,1,C.band); R(184+fl,155,3,1,C.band);      // loose bandage tails
    caption([
      [4,9,"SOMEONE IS CALLING HER NAME."],
    ],st);
    if(st>11){ ctext("- SHE LIVES -",92,`rgba(239,234,222,${clamp((st-11)/2,0,.9)})`,1);
      if(st>14&&(st*1.2|0)%2)ctext("CLICK TO BEGIN AGAIN",H-10,'#6a6478',1); }
    if(st>10)musicVol=Math.max(.4,1-(st-10)*.04);
  }},
];

/* ---------------- title ---------------- */
function drawTitle(t){
  bands([C.black,'#0e0c16','#12101c','#151222'],0,120);
  drawStars(t,1);
  R(296,24,14,14,C.bone); R(299,21,8,20,C.bone); R(293,27,20,8,C.bone);
  bands(['#0d0b15','#0a0811','#08060e'],120,H);
  R(0,64,84,152,'#1d1a26'); R(300,70,84,146,'#1d1a26');
  walkway(84,140,90,false); walkway(210,148,80,false);
  ctext("NIER REPLICANT",70,C.white,2);
  ctext("16-BIT · KAINE",96,C.bone,1);
  R(W/2-60,108,120,1,'#2c2838');
  if((t*1.6|0)%2)ctext("PRESS START",148,'#9a90a8',1);
  ctext("A TRIBUTE IN PIXELS AND SQUARE WAVES",H-12,'#332e40',1);
}

/* ---------------- main loop ---------------- */
let last=0;
try{ localStorage.setItem('kaine16_views',
  (+localStorage.getItem('kaine16_views')||1)+1); }catch(e){}
const qp=new URLSearchParams(location.search);
if(qp.get('t')!==null){ state='film'; filmT=parseFloat(qp.get('t'))||0; }

function sceneAt(t){
  let acc=0;
  for(let i=0;i<SCN.length;i++){ if(t<acc+SCN[i].dur)return[i,t-acc]; acc+=SCN[i].dur; }
  return[SCN.length-1,t-acc+SCN[SCN.length-1].dur];
}
function frame(ts){
  requestAnimationFrame(frame);
  const dt=Math.min(.05,(ts-last)/1000)||.016; last=ts;
  if(state==='title'){ drawTitle(ts/1000); curSection='none'; return; }
  if(!window._frozen)filmT+=dt;
  const [i,st]=sceneAt(filmT), sc=SCN[i];
  if(i!==sceneIdx){ sceneIdx=i; S_={}; if(sc.init)sc.init(); }
  curSection=sc.sec;
  sc.draw(st,dt);
  if(st<.6)R(0,0,W,H,`rgba(0,0,0,${1-st/.6})`);
  const rem=sc.dur-st;
  if(sc.dur<1e8&&rem<.6)R(0,0,W,H,`rgba(0,0,0,${1-rem/.6})`);
  for(let k=0;k<26;k++){g.fillStyle=Math.random()<.5?'rgba(255,255,255,.04)':'rgba(0,0,0,.06)';
    g.fillRect(Math.random()*W|0,Math.random()*H|0,1,1);}
}
requestAnimationFrame(frame);

addEventListener('pointerdown',()=>{
  if(state==='title'){
    initAudio(); if(ac.state==='suspended')ac.resume();
    state='film'; filmT=0; sceneIdx=-1; musicVol=1; syncSong(0); sfxChime();
  }else if(SCN[sceneIdx]&&SCN[sceneIdx].name==='tears'){
    const st=sceneAt(filmT)[1];
    if(st>14){ state='title'; sceneIdx=-1; curSection='none'; musicVol=1; if(windGain)setWind(0); }
  }
});
window.seek=(s,fr)=>{state='film';filmT=s;sceneIdx=-1;window._frozen=!!fr;syncSong(s);};
addEventListener('keydown',e=>{
  if(e.key==='ArrowRight'&&state==='film'){
    let acc=0; for(let i=0;i<=sceneIdx;i++)acc+=SCN[i].dur; filmT=acc;
  }
});
</script>
