/* ---------------- utils ---------------- */
function mulberry(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;}}
const clamp=(v,a,b)=>v<a?a:v>b?b:v;
const lerp=(a,b,t)=>a+(b-a)*t;
function hex(c){return[parseInt(c.slice(1,3),16),parseInt(c.slice(3,5),16),parseInt(c.slice(5,7),16)];}
function mix(c1,c2,t){const a=hex(c1),b=hex(c2);t=clamp(t,0,1);
  return `rgb(${(lerp(a[0],b[0],t))|0},${(lerp(a[1],b[1],t))|0},${(lerp(a[2],b[2],t))|0})`;}
function R(x,y,w,h,c){g.fillStyle=c;g.fillRect(x|0,y|0,w|0,h|0);}
function disc(cx,cy,r,col){ g.fillStyle=col; cx|=0; cy|=0; r|=0;
  for(let dy=-r;dy<=r;dy++){const w2=Math.sqrt(r*r-dy*dy)|0;
    g.fillRect(cx-w2,cy+dy,w2*2+1,1);} }
function limb(x1,y1,x2,y2,w,col){
  g.fillStyle=col;
  const n=Math.max(Math.abs(x2-x1),Math.abs(y2-y1))|0;
  for(let i=0;i<=n;i++){
    g.fillRect((x1+(x2-x1)*i/n-w/2)|0,(y1+(y2-y1)*i/n-w/2)|0,w,w);}
}
function ring(cx,cy,rr,sq,col){
  const n=Math.max(14,rr)|0; g.fillStyle=col;
  for(let a=0;a<n;a++){const th=a/n*6.2832;
    g.fillRect(cx+Math.cos(th)*rr|0,cy+Math.sin(th)*rr*sq|0,2,2);}
}
function bandsD(cs,y0,y1){
  const n=cs.length, hh=(y1-y0)/n;
  for(let i=0;i<n;i++)R(0,y0+i*hh,W,Math.ceil(hh)+1,cs[i]);
  for(let i=0;i<n-1;i++){
    const yb=(y0+(i+1)*hh)|0; g.fillStyle=cs[i+1];
    for(let r2=0;r2<4;r2++){const yy=yb-4+r2;
      for(let x=((r2&1)*2);x<W;x+=4)g.fillRect(x,yy,2,1);}
    g.fillStyle=cs[i];
    for(let r2=0;r2<3;r2++){const yy=yb+1+r2;
      for(let x=((r2&1)*2)+2;x<W;x+=5)g.fillRect(x,yy,2,1);}
  }
}
/* checker-dither a horizontal shading boundary between two drawn areas */
function ditherRow(x0,x1,y,rows,col){
  g.fillStyle=col;
  for(let r2=0;r2<rows;r2++)for(let x=x0+((r2&1)*2);x<x1;x+=4)
    g.fillRect(x,y+r2,2,1);
}

'.':[0,0,0,0,2],',':[0,0,0,2,4],':':[0,2,0,2,0],'!':[2,2,2,0,2],'?':[7,1,3,0,2],

function drawText(s,x,y,c,sc){
  sc=sc||1; g.fillStyle=c; s=(''+s).toUpperCase();
  let cx=x|0;
  for(const ch of s){
    if(ch===' '){cx+=4*sc;continue;}
    const gl=FONT[ch];
    if(gl){for(let r2=0;r2<5;r2++)for(let b=0;b<3;b++)
      if(gl[r2]>>(2-b)&1)g.fillRect(cx+b*sc,(y|0)+r2*sc,sc,sc);}
    cx+=4*sc;
  }
}
const textW=(s,sc)=>s.length*4*(sc||1)-(sc||1);
function ctext(s,y,c,sc){drawText(s,(W-textW(s,sc))/2,y,c,sc);}
/* theatrical subs: queued by scenes, drawn onto the bar after letterbox() */
let _capQ=null;
function caption(cues,st){ _capQ={cues,st}; }
function flushCaption(){
  if(!_capQ)return;
  const {cues,st}=_capQ; _capQ=null;
  for(const q of cues)if(st>=q[0]&&st<q[1]){
    if(q[3]){ ctext(q[3],H-BAR+7,'#6a6577',1); ctext(q[2],H-BAR+17,C.bone,1); }
    else ctext(q[2],H-BAR+12,C.bone,1);
  }
}
function letterbox(){ R(0,0,W,BAR,'#000'); R(0,H-BAR,W,BAR,'#000'); }

let MIDI=null, songStart=0, midiPtr=0;
function parseMidi(u){
  const rd32=i=>((u[i]<<24|u[i+1]<<16|u[i+2]<<8|u[i+3])>>>0), rd16=i=>u[i]<<8|u[i+1];
  if(u[0]!==0x4D||u[1]!==0x54||u[2]!==0x68||u[3]!==0x64)return null;
  const ntrk=rd16(10), tpq=rd16(12);
  let i=14; const raw=[], tempos=[{t:0,us:500000}];
  for(let tr=0;tr<ntrk;tr++){
    if(rd32(i)!==0x4D54726B)return null;
    const len=rd32(i+4); let j=i+8; const end=j+len, on={}; let t=0,run=0;
    while(j<end){
      let v=0,b;
      do{b=u[j++];v=(v<<7)|(b&127);}while(b&128);
      t+=v;
      let s=u[j];
      if(s===0xFF){ const mt=u[j+1]; let ln=0; j+=2;
        do{b=u[j++];ln=(ln<<7)|(b&127);}while(b&128);
        if(mt===0x51)tempos.push({t,us:u[j]<<16|u[j+1]<<8|u[j+2]});
        j+=ln;
      }else if(s===0xF0||s===0xF7){ let ln=0; j++;
        do{b=u[j++];ln=(ln<<7)|(b&127);}while(b&128); j+=ln;
      }else{
        if(s&0x80){run=s;j++;}else s=run;
        const hi=s&0xF0;
        if(hi===0xC0||hi===0xD0)j+=1;
        else{ const p1=u[j],p2=u[j+1]; j+=2;
          if(hi===0x90&&p2>0)(on[p1]=on[p1]||[]).push({t,v:p2,tr});
          else if(hi===0x80||(hi===0x90&&p2===0)){
            const q=(on[p1]||[]).shift(); if(q)raw.push({st:q.t,en:t,m:p1,v:q.v,tr});
          }
        }
      }
    }
    i=end;
  }
  tempos.sort((a,b)=>a.t-b.t);
  const seg=[]; let sec=0;
  for(let k=0;k<tempos.length;k++){
    if(k>0)sec+=(tempos[k].t-tempos[k-1].t)/tpq*tempos[k-1].us/1e6;
    seg.push({t:tempos[k].t,sec,us:tempos[k].us});
  }
  const toSec=t=>{let s=seg[0];for(const x of seg){if(x.t<=t)s=x;else break;}
    return s.sec+(t-s.t)/tpq*s.us/1e6;};
  const ev=raw.map(n=>({t:toSec(n.st),d:Math.max(.09,toSec(n.en)-toSec(n.st)),m:n.m,v:n.v/127,tr:n.tr}))
    .sort((a,b)=>a.t-b.t);
  if(!ev.length)return null;
  const sum={},cnt={};
  for(const e of ev){sum[e.tr]=(sum[e.tr]||0)+e.m;cnt[e.tr]=(cnt[e.tr]||0)+1;}
  const trks=Object.keys(cnt);
  const bassTrack=trks.length>1
    ? +trks.reduce((a,b)=>sum[a]/cnt[a]<=sum[b]/cnt[b]?a:b) : -1;
  const spb=seg[0].us/1e6;
  const dur=ev.reduce((m,e)=>Math.max(m,e.t+e.d),0)+spb;
  return {ev,dur,spb,bassTrack};
}

function tickMidi(){

    for(const L2 of S_.lights){
      L2.x+=Math.sin(st*.8+L2.p)*dt*30; L2.y-=L2.v*dt*.4;
      if(L2.y<40){L2.y=210;L2.x=Math.random()*W;}
      const tw=.4+.6*Math.max(0,Math.sin(st*3+L2.p));
      disc(L2.x,L2.y,2,`rgba(240,216,136,${tw*.5})`);
      if(Math.random()<dt*2)limb(L2.x,L2.y,L2.x+8,L2.y-14,1,'rgba(247,244,234,.25)');
    }
    // the names, falling slow — dissolving into motes after the answer
    const freed=st>22;
    for(const L2 of S_.lines){
      L2.y-=dt*9;
      if(!L2.alive)continue;
      if(freed&&L2.y<200&&Math.random()<dt*2){
        L2.alive=false;
        for(let k=0;k<10;k++)S_.motes.push({x:W/2+(Math.random()-.5)*textW(L2.t,1),
          y:L2.y,vy:-10-Math.random()*20,l:1.2});
        continue;
      }
      if(L2.y>0&&L2.y<H)ctext(L2.t,L2.y|0,L2.t.length<12?C.white:C.bone,1);
    }
    for(const m of S_.motes){ m.y+=m.vy*dt; m.l-=dt;
      if(m.l>0){g.fillStyle=C.gold2;g.globalAlpha=clamp(m.l,0,1);
        g.fillRect(m.x|0,m.y|0,2,2);} }
    g.globalAlpha=1; S_.motes=S_.motes.filter(m=>m.l>0);
    caption([
      [2,6,'"PROPOSAL: CEASE THIS POINTLESS STRUGGLE."','POD 153'],
      [9,13,'"QUERY: DO YOU WISH FOR THEM TO LIVE?"','POD 042'],
      [15,19,'"...YES. EVERYTHING."','POD 042'],
      [23,28,'"A FUTURE IS NOT GIVEN TO YOU."','POD 042'],
    ],st);
  }},
/* ---- 13 DAWN ---- */
{ name:'dawn', dur:1e9, sec:'outro',
  init(){ setWind(.02); S_.fly=[]; const r=mulberry(21);
    for(let i=0;i<32;i++)S_.fly.push({x:r()*W,y:70+r()*160,p:r()*7,v:2+r()*4}); },
  draw(st,dt){
    if(st<12){
      const d=clamp(st/12,0,1);
      bandsD([mix('#141420','#3a3550',d),mix('#181826','#5d4a58',d),
        mix('#1d1c2c','#8a6355',d),mix('#232030','#b98a58',d)],0,206);
      drawStars(st,1-d);
      R(0,206,W,H-206,mix('#141810','#25301b',d));
      for(let i=0;i<120;i++){ const gx=i*4+((i*7)%5);
        if((i*13)%7<2)continue;
        const hgt=3+((i*13)%5), sway=Math.sin(st*1.2+i)*1;
        g.fillStyle=mix((i%3)?'#1d2415':'#2a331d',(i%3)?'#39482a':'#59683a',d);
        g.fillRect(gx+sway|0,207-hgt,1,hgt+3); }
      drawTwoB(190,224,0,'lie');
      R(248,220,8,4,C.hair); R(257,220,14,4,C.ink); R(271,221,7,3,C.skin);
      R(104,220,10,4,C.hair2); R(114,220,16,4,C.dgrey);
      drawPod(150,158,st,false); drawPod(298,150,st+2,true);
      for(const f of S_.fly){ f.x+=Math.sin(st*.6+f.p)*dt*7; f.y-=f.v*dt*.6;
        if(f.y<50)f.y=232,f.x=Math.random()*W;
        const tw=.4+.6*Math.max(0,Math.sin(st*2+f.p));
        g.fillStyle=`rgba(232,192,105,${tw*(.3+d*.7)})`; g.fillRect(f.x|0,f.y|0,2,2);}
      caption([[3,8,'"A FUTURE IS NOT GIVEN TO YOU."','POD 042'],
        [8.5,11.8,'"IT IS SOMETHING YOU MUST TAKE FOR YOURSELF."','POD 042']],st);
      return;
    }
    // the last shot: her face, no blindfold, dawn on her skin
    bandsD(['#2b2430','#3a3040','#4a3c48','#5a4850'],0,H);
    faceTwoB(st,{blind:false,dawn:true});
    if(st>18){ ctext("- FIN -",50,`rgba(239,234,222,${clamp((st-18)/2,0,.9)})`,1);
      if(st>22&&(st*1.2|0)%2)ctext("CLICK TO BEGIN AGAIN",H-BAR-16,'#6a6577',1); }
    if(st>12)musicVol=Math.max(.35,1-(st-12)*.04);
  }},
];

/* ---------------- title ---------------- */
function drawTitle(t){
  R(0,0,W,H,'#000');
  bandsD(['#12101c','#161320','#1a1626','#1e1a2c'],BAR,190);
  drawStars(t,1);
  disc(392,60,18,C.bone); disc(390,58,15,'#e4dfcc');
  drawLayer(farL,30,'#15131a'); drawLayer(midL,110,'#0f0e13');
  bandsD(['#0d0c11','#0b0a0e'],222,H-BAR);
  ctext("NIER:AUTOMATA",96,C.white,3);
  ctext("PIXEL CINEMA · ROUTE A + ENDING E",132,C.bone,1);
  R(W/2-80,146,160,1,C.dgrey);
  if((t*1.6|0)%2)ctext("PRESS START",188,C.lgrey,1);
  letterbox();
  ctext("A TRIBUTE IN PIXELS AND SQUARE WAVES",H-BAR+12,'#3f3b45',1);
}

/* ---------------- main loop ---------------- */
let last=0;
try{ localStorage.setItem('cine16_views',
  (+localStorage.getItem('cine16_views')||1)+1); }catch(e){}
const qp=new URLSearchParams(location.search);
if(qp.get('t')!==null){ state='film'; filmT=parseFloat(qp.get('t'))||0; }

function sceneAt(t){
  let acc=0;
  for(let i=0;i<SCN.length;i++){ if(t<acc+SCN[i].dur)return[i,t-acc]; acc+=SCN[i].dur; }
  return[SCN.length-1,t-acc+SCN[SCN.length-1].dur];
}
function frame(ts){
  requestAnimationFrame(frame);
  const dt=Math.min(.05,(ts-last)/1000)||.016; last=ts;
  if(state==='title'){ drawTitle(ts/1000); curSection='none'; return; }
  if(!window._frozen)filmT+=dt;
  const [i,st]=sceneAt(filmT), sc=SCN[i];
  if(i!==sceneIdx){ sceneIdx=i; S_={}; if(sc.init)sc.init(); }
  curSection=sc.sec;
  sc.draw(st,dt);
  // film grain inside the frame only
  for(let k=0;k<32;k++){g.fillStyle=Math.random()<.5?'rgba(255,255,255,.035)':'rgba(0,0,0,.05)';
    g.fillRect(Math.random()*W|0,BAR+Math.random()*(H-BAR*2)|0,1,1);}
  if(st<.4)R(0,0,W,H,`rgba(0,0,0,${1-st/.4})`);
  const rem=sc.dur-st;
  if(sc.dur<1e8&&rem<.4)R(0,0,W,H,`rgba(0,0,0,${1-rem/.4})`);
  letterbox();
  flushCaption();
}
requestAnimationFrame(frame);

addEventListener('pointerdown',()=>{
  if(state==='title'){
    initAudio(); if(ac.state==='suspended')ac.resume();
    state='film'; filmT=0; sceneIdx=-1; musicVol=1; syncSong(0); sfxChime();
  }else if(SCN[sceneIdx]&&SCN[sceneIdx].name==='dawn'){
    const st=sceneAt(filmT)[1];
    if(st>22){ state='title'; sceneIdx=-1; curSection='none'; musicVol=1; if(windGain)setWind(0); }
  }
});
window.seek=(s,fr)=>{state='film';filmT=s;sceneIdx=-1;window._frozen=!!fr;syncSong(s);};
addEventListener('keydown',e=>{
  if(e.key==='ArrowRight'&&state==='film'){
    let acc=0; for(let i=0;i<=sceneIdx;i++)acc+=SCN[i].dur; filmT=acc;
  }
});
</script>
