function mulberry(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;}}
const clamp=(v,a,b)=>v<a?a:v>b?b:v;
const lerp=(a,b,t)=>a+(b-a)*t;
function hex(c){return[parseInt(c.slice(1,3),16),parseInt(c.slice(3,5),16),parseInt(c.slice(5,7),16)];}
function mix(c1,c2,t){const a=hex(c1),b=hex(c2);t=clamp(t,0,1);
  return `rgb(${(lerp(a[0],b[0],t))|0},${(lerp(a[1],b[1],t))|0},${(lerp(a[2],b[2],t))|0})`;}
function R(x,y,w,h,c){g.fillStyle=c;g.fillRect(x|0,y|0,w|0,h|0);}
function disc(cx,cy,r,col){ g.fillStyle=col; cx|=0; cy|=0; r|=0;
  for(let dy=-r;dy<=r;dy++){const w2=Math.sqrt(r*r-dy*dy)|0;
    g.fillRect(cx-w2,cy+dy,w2*2+1,1);} }
function limb(x1,y1,x2,y2,w,col){
  g.fillStyle=col;
  const n=Math.max(Math.abs(x2-x1),Math.abs(y2-y1))|0;
  for(let i=0;i<=n;i++){
    g.fillRect((x1+(x2-x1)*i/n-w/2)|0,(y1+(y2-y1)*i/n-w/2)|0,w,w);}
}
function ring(cx,cy,rr,sq,col){
  const n=Math.max(14,rr)|0; g.fillStyle=col;
  for(let a=0;a<n;a++){const th=a/n*6.2832;
    g.fillRect(cx+Math.cos(th)*rr|0,cy+Math.sin(th)*rr*sq|0,2,2);}
}
/* dithered gradient bands — the hi-bit sky */
function bandsD(cs,y0,y1){
  const n=cs.length, hh=(y1-y0)/n;
  for(let i=0;i<n;i++)R(0,y0+i*hh,W,Math.ceil(hh)+1,cs[i]);
  for(let i=0;i<n-1;i++){
    const yb=(y0+(i+1)*hh)|0; g.fillStyle=cs[i+1];
    for(let r2=0;r2<4;r2++){const yy=yb-4+r2;
      for(let x=((r2&1)*2);x<W;x+=4)g.fillRect(x,yy,2,1);}
    g.fillStyle=cs[i];
    for(let r2=0;r2<3;r2++){const yy=yb+1+r2;
      for(let x=((r2&1)*2)+2;x<W;x+=5)g.fillRect(x,yy,2,1);}
  }
}

function drawText(s,x,y,c,sc){
  sc=sc||1; g.fillStyle=c; s=(''+s).toUpperCase();

    const gl=FONT[ch];

function parseMidi(u){
  const rd32=i=>((u[i]<<24|u[i+1]<<16|u[i+2]<<8|u[i+3])>>>0), rd16=i=>u[i]<<8|u[i+1];
  if(u[0]!==0x4D||u[1]!==0x54||u[2]!==0x68||u[3]!==0x64)return null;
  const ntrk=rd16(10), tpq=rd16(12);

    if(rd32(i)!==0x4D54726B)return null;
    const len=rd32(i+4); let j=i+8; const end=j+len, on={}; let t=0,run=0;
    while(j<end){
      let v=0,b;
      do{b=u[j++];v=(v<<7)|(b&127);}while(b&128);
      t+=v;
      let s=u[j];
      if(s===0xFF){ const mt=u[j+1]; let ln=0; j+=2;
        do{b=u[j++];ln=(ln<<7)|(b&127);}while(b&128);
        if(mt===0x51)tempos.push({t,us:u[j]<<16|u[j+1]<<8|u[j+2]});
        j+=ln;
      }else if(s===0xF0||s===0xF7){ let ln=0; j++;
        do{b=u[j++];ln=(ln<<7)|(b&127);}while(b&128); j+=ln;
      }else{
        if(s&0x80){run=s;j++;}else s=run;
        const hi=s&0xF0;
        if(hi===0xC0||hi===0xD0)j+=1;
        else{ const p1=u[j],p2=u[j+1]; j+=2;
          if(hi===0x90&&p2>0)(on[p1]=on[p1]||[]).push({t,v:p2,tr});
          else if(hi===0x80||(hi===0x90&&p2===0)){
            const q=(on[p1]||[]).shift(); if(q)raw.push({st:q.t,en:t,m:p1,v:q.v,tr});
          }
        }
      }
    }
    i=end;
  }
  tempos.sort((a,b)=>a.t-b.t);
  const seg=[]; let sec=0;
  for(let k=0;k<tempos.length;k++){
    if(k>0)sec+=(tempos[k].t-tempos[k-1].t)/tpq*tempos[k-1].us/1e6;
    seg.push({t:tempos[k].t,sec,us:tempos[k].us});
  }
  const toSec=t=>{let s=seg[0];for(const x of seg){if(x.t<=t)s=x;else break;}
    return s.sec+(t-s.t)/tpq*s.us/1e6;};
  const ev=raw.map(n=>({t:toSec(n.st),d:Math.max(.09,toSec(n.en)-toSec(n.st)),m:n.m,v:n.v/127,tr:n.tr}))
    .sort((a,b)=>a.t-b.t);
  if(!ev.length)return null;
  const sum={},cnt={};
  for(const e of ev){sum[e.tr]=(sum[e.tr]||0)+e.m;cnt[e.tr]=(cnt[e.tr]||0)+1;}
  const trks=Object.keys(cnt);
  const bassTrack=trks.length>1
    ? +trks.reduce((a,b)=>sum[a]/cnt[a]<=sum[b]/cnt[b]?a:b) : -1;
  const spb=seg[0].us/1e6;
  const dur=ev.reduce((m,e)=>Math.max(m,e.t+e.d),0)+spb;
  return {ev,dur,spb,bassTrack};
}

(function loadMidi(){
  try{
    if(MIDI_B64[0]!=='@'){
      const s=atob(MIDI_B64), u=new Uint8Array(s.length);
      for(let k=0;k<s.length;k++)u[k]=s.charCodeAt(k);
      MIDI=parseMidi(u); if(MIDI)MIDI.src='embedded';
    }
  }catch(e){MIDI=null;}
  window._midiOK=!!MIDI;
  if(MIDI)window._midiInfo={notes:MIDI.ev.length,dur:MIDI.dur,bassTrack:MIDI.bassTrack,src:MIDI.src};
})();
function pulseWave(d){
  const n=32, re=new Float32Array(n), im=new Float32Array(n);
  for(let i=1;i<n;i++)im[i]=(2/(i*Math.PI))*Math.sin(Math.PI*d*i);
  return ac.createPeriodicWave(re,im);
}
function initAudio(){
  if(ac)return;
  ac=new (window.AudioContext||window.webkitAudioContext)();
  master=ac.createGain(); master.gain.value=.55; master.connect(ac.destination);
  filt=ac.createBiquadFilter(); filt.type='lowpass'; filt.frequency.value=12000;
  musicBus=ac.createGain(); musicBus.connect(filt); filt.connect(master);
  echoIn=ac.createGain(); const dl=echoDelay=ac.createDelay(1);
  dl.delayTime.value=MIDI?MIDI.spb*.75:.45;
  const fb=ac.createGain(); fb.gain.value=.32; const wet=ac.createGain(); wet.gain.value=.24;
  echoIn.connect(dl); dl.connect(fb); fb.connect(dl); dl.connect(wet); wet.connect(musicBus);
  noiseBuf=ac.createBuffer(1,ac.sampleRate,ac.sampleRate);
  const d=noiseBuf.getChannelData(0); for(let i=0;i<d.length;i++)d[i]=Math.random()*2-1;
  windGain=ac.createGain(); windGain.gain.value=0; windGain.connect(master);
  const wn=ac.createBufferSource(); wn.buffer=noiseBuf; wn.loop=true;
  const wf=ac.createBiquadFilter(); wf.type='bandpass'; wf.frequency.value=560; wf.Q.value=.5;
  wn.connect(wf); wf.connect(windGain); wn.start();
  pw25=pulseWave(.25); pw125=pulseWave(.125);
  musicOn=true;
  setInterval(tick,80);
}
function env(t,dur,vol,rel,sus){
  const gn=ac.createGain(); gn.gain.setValueAtTime(.0001,t);
  gn.gain.linearRampToValueAtTime(vol,t+.012);
  if(sus===false){ gn.gain.exponentialRampToValueAtTime(.0008,t+dur); }
  else{ gn.gain.setValueAtTime(vol,t+Math.max(.012,dur-.05));
        gn.gain.exponentialRampToValueAtTime(.0008,t+dur+(rel||.06)); }
  return gn;
}
function voice(t,midi,dur,vol,o){
  o=o||{};
  const osc=ac.createOscillator();
  if(o.wave==='tri')osc.type='triangle';
  else if(o.wave==='p25')osc.setPeriodicWave(pw25);
  else osc.type='square';
  osc.frequency.value=nfr(midi);
  if(o.detune)osc.detune.value=o.detune;
  if(o.vib){
    const lfo=ac.createOscillator(),lg=ac.createGain();
    lfo.frequency.value=5.2; lg.gain.setValueAtTime(0,t);
    lg.gain.linearRampToValueAtTime(nfr(midi)*.011,t+.3);
    lfo.connect(lg); lg.connect(osc.frequency); lfo.start(t); lfo.stop(t+dur+.2);
  }
  const gn=env(t,dur,vol,o.rel,o.sus);
  osc.connect(gn); gn.connect(musicBus);
  if(o.echo){const s=ac.createGain();s.gain.value=o.echo;gn.connect(s);s.connect(echoIn);}
  osc.start(t); osc.stop(t+dur+(o.rel||.12));
}
function noiseHit(t,vol,dur,type,f,q){
  const src=ac.createBufferSource(); src.buffer=noiseBuf;
  src.playbackRate.value=.9+Math.random()*.2;
  const bf=ac.createBiquadFilter(); bf.type=type; bf.frequency.value=f; bf.Q.value=q||.8;
  const gn=env(t,dur,vol,.02,false);
  src.connect(bf); bf.connect(gn); gn.connect(master);
  src.start(t); src.stop(t+dur+.05);
}
function playMidiNote(e,at){
  const S=SECTIONS[curSection]||{}; const mv=musicVol*(S.vol||1);
  const vol=.2*(.35+.65*e.v);
  const isBass=MIDI.bassTrack>=0 ? e.tr===MIDI.bassTrack : e.m<52;
  if(isBass) voice(at,e.m,e.d,vol*(e.m<52?1.05:.7)*mv,{wave:'tri'});
  else{
    voice(at,e.m,e.d,vol*.8*mv,{vib:e.d>.4,echo:S.echo||.5});
    if(S.oct)voice(at,e.m+12,e.d,vol*.18*mv,{wave:'p25',echo:.4});
  }
}
function tickMidi(){
  const now=ac.currentTime, horizon=now+.4;
  const S=SECTIONS[curSection]||{};
  filt.frequency.setTargetAtTime(S.lp||12000,now,.3);
  let guard=0;
  while(guard++<4000){
    if(midiPtr<MIDI.ev.length){
      const e=MIDI.ev[midiPtr], at=songStart+e.t;
      if(at>=horizon)break;
      midiPtr++;
      if(at<now-.05)continue;
      playMidiNote(e,at);
    }else{
      if(songStart+MIDI.dur>=horizon)break;
      songStart+=MIDI.dur; midiPtr=0;
    }
  }
}
function tick(){ if(musicOn&&MIDI&&state==='film')tickMidi(); }
function syncSong(t){ if(ac&&MIDI){ songStart=ac.currentTime-(t%MIDI.dur); midiPtr=0; } }
function sfxSlash(){ if(!ac)return; noiseHit(ac.currentTime,.05,.07,'highpass',3400,1.5); }
function sfxBoom(v){ if(!ac)return; noiseHit(ac.currentTime,v||.08,.4,'lowpass',600); }
function sfxShot(){ if(!ac)return;
  const t=ac.currentTime,o=ac.createOscillator();o.setPeriodicWave(pw25);
  o.frequency.setValueAtTime(1500,t);o.frequency.exponentialRampToValueAtTime(700,t+.06);
  const gn=env(t,.06,.02,.01,false);o.connect(gn);gn.connect(master);o.start(t);o.stop(t+.09);}
function sfxChime(){ if(!ac)return; const t=ac.currentTime;

function genLayer(seed,gY,hMin,hMax){
  const rnd=mulberry(seed), bs=[]; let x=0;

    const w=18+rnd()*38|0, h=hMin+rnd()*(hMax-hMin)|0;
    const cols=[]; const nc=Math.max(2,w/5|0);

function drawLayer(L,off,col,detail){

    for(let k=0;k<10;k++)R(k*52,210,26,3,'#8a877e');
    // ADAM: pale, barefoot, waiting — then the duel
    const phase=st<6?0:st<14?1:2;
    const axx=300, ayy=222;
    if(!S_.stabbed){
      const lunge=phase===1?Math.sin(st*4)*6:0;
      R(axx-6+lunge,ayy-40,13,26,'#e8d8c0');
      g.fillStyle='#3a3026';
      for(let k=0;k<6;k++)g.fillRect(axx-4+lunge+(k*3)%10,ayy-36+(k*5)%18,2,2);
      R(axx-7+lunge,ayy-50,15,11,'#f0ece0'); R(axx-6+lunge,ayy-51,13,2,'#f7f4ea');
      R(axx-2+lunge,ayy-44,6,3,'#c9a084');
      limb(axx-5+lunge,ayy-16,axx-8+lunge,ayy,4,'#e0d0b8');
      limb(axx+5+lunge,ayy-16,axx+8+lunge,ayy,4,'#d8c8b0');
    }
    const adv2=phase===1?clamp((st-6)/8,0,1):1;
    drawTwoB(170+adv2*100|0,222,st,phase===1?'run':(phase===2?'slash':'stand'));
    if(phase===2&&!S_.stabbed){ S_.stabbed=true; sfxSlash(); }
    if(S_.stabbed){
      // adam kneeling, run through
      R(axx-5,ayy-28,12,16,'#e8d8c0'); R(axx-6,ayy-38,14,10,'#f0ece0');
      R(axx-1,ayy-32,5,3,'#c9a084');
      R(axx-8,ayy-4,18,4,'#d8c8b0');
      limb(axx-16,ayy-24,axx+10,ayy-20,2,C.metal2);
      g.fillStyle='rgba(213,37,46,.5)'; g.fillRect(axx-2,ayy-22,6,8);
    }
    caption([
      [1.5,5,"A CITY OF WHITE BOXES. A PHOTOCOPY OF US."],
      [5.8,9.2,'"I HAVE READ EVERYTHING. FEEL NOTHING."','ADAM'],
      [10,13.5,'"WHERE. IS. 9S."','2B'],
      [15.5,18.5,'"SO THIS... IS DEATH."','ADAM'],
      [19,21.5,"HE SMILED GOING DOWN."],
    ],st);
  }},
/* ---- 12 EVE ---- */
{ name:'eve', dur:26, sec:'storm',
  init(){ setWind(.03); S_.shake=0; S_.hits=0; S_.down=false; },
  draw(st,dt){
    bandsD(['#3a1c22','#44202a','#4e242e','#44202a','#3a1a20'],0,192);
    drawLayer(farL,100,'#2a161c');
    bandsD(['#2a1418','#221014','#1a0c10'],190,H);
    // berserk machines, eyes red
    for(let k=0;k<5;k++){
      const kx=30+k*100, rock=Math.sin(st*6+k)*2|0;

    }
    S_.shake=Math.max(0,S_.shake-dt*10);

    const exx=330, eyy=222;

      g.fillStyle='rgba(40,20,30,.6)';
      for(let k=0;k<7;k++){

      R(exx-7+rage,eyy-42,14,28,'#e0d0b8');
      g.fillStyle='#2a2028';
      for(let k=0;k<9;k++)g.fillRect(exx-6+rage+(k*3)%12,eyy-40+(k*5)%22,2,3);
      R(exx-8+rage,eyy-52,16,11,'#f0ece0'); R(exx-3+rage,eyy-46,7,3,'#c9a084');
      limb(exx-6+rage,eyy-16,exx-10+rage,eyy,4,'#221f28');
      limb(exx+6+rage,eyy-16,exx+10+rage,eyy,4,'#2a2733');
      limb(exx+7+rage,eyy-36,exx+22+rage,eyy-46,4,'#e0d0b8');
    }
    // duel: 2B trades blows
    const cyc=(st%2.2)/2.2;

    if(st<17)drawTwoB(sxx|0,222,st,cyc>.5&&cyc<.75?'slash':'run');
    if(cyc>.5&&cyc<.56&&st<16&&S_.hits<st){S_.hits=st+1;sfxSlash();S_.shake=3;}
    // the fall + infection
    if(st>=17){
      if(!S_.down){S_.down=true;sfxBoom(.1);}
      R(exx-16,eyy-6,30,6,'#e0d0b8'); R(exx+12,eyy-5,10,4,'#f0ece0');
      draw9S(250,222,st,'lie');
      // red static crawling on 9S — bounded, low alpha
      const rr=mulberry((st*8|0));
      g.fillStyle='rgba(213,37,46,.45)';
      for(let k=0;k<20;k++)g.fillRect(238+rr()*36|0,206+rr()*16|0,2,2);
      drawTwoB(226,224,st,'hold');
    }
    g.setTransform(1,0,0,1,0,0);
    caption([
      [1.5,5,"EVE. GRIEF WITH NOWHERE TO GO."],
      [6,9.5,'"YOU TOOK MY BROTHER."','EVE'],
      [12,15,"THE LAST DUEL OF ROUTE A."],
      [18,21,"THE VIRUS WAS ALREADY IN 9S."],
      [21.5,25.5,'"IT ALWAYS... ENDS LIKE THIS."','2B'],
    ],st);
  }},
/* ---- 13 ENDING A CARD ---- */
{ name:'cardA', dur:8, sec:'intro',

    ctext("ENDING A",110,C.white,2);

/* ---- 14 ENDING E : THE CREDITS ---- */
{ name:'credits', dur:45, sec:'full',
  init(){
    const names=[
      "NIER:AUTOMATA HI-BIT","", "DIRECTOR","YOKO TARO","",
      "MUSIC","KEIICHI OKABE","", "PRODUCER","YOSUKE SAITO","",
      "2B","YUI ISHIKAWA","", "9S","NATSUKI HANAE","",
      "A2","AYAKA SUWA","", "PASCAL","AOI YUKI","",
      "ADAM AND EVE","DAISUKE NAMIKAWA / TATSUHISA SUZUKI","",
      "PODS 042 AND 153","", "SQUARE ENIX","PLATINUMGAMES","",
      "PIXELS AND CHIPTUNE","CLAUDE","", "AND YOU",
    ];
    S_.lines=names.map((t,i)=>({t,y:290+i*16,hp:Math.ceil(t.length*1.6)+3,cut:0,dead:!t}));
    S_.ship={x:W/2,alive:true,rt:0}; S_.bul=[]; S_.ebul=[]; S_.parts=[]; S_.allies=[];
    S_.fire=0; S_.deaths=0; S_.msgs=[]; S_.msgT=0;
    S_.help=["RESCUE OFFER: PLAYER_9S","RESCUE OFFER: YUI.A2","RESCUE OFFER: EMIL_HEAD",
      "RESCUE OFFER: DEVOLA AND POPOLA","RESCUE OFFER: JACKASS","RESCUE OFFER: ANEMONE",
      "RESCUE OFFER: PASCAL","RESCUE OFFER: OPERATOR 6O","RESCUE OFFER: COMMANDER WHITE",
      "RESCUE OFFER: SOMEONE, SOMEWHERE"];
  },
  draw(st,dt){
    R(0,0,W,H,'#060609'); drawStars(st,.7);
    const sp=S_.ship, allied=st>24;
    for(const L of S_.lines){ L.y-=dt*11.5; }
    if(sp.alive){ sp.x=W/2+Math.sin(st*.9)*120+Math.sin(st*2.3)*30;
      if(st>8.8&&st<9||st>17.8&&st<18){
        if(sp.alive){sp.alive=false;sp.rt=1.4;S_.deaths++;sfxBoom(.1);
          for(let i=0;i<30;i++)S_.parts.push({x:sp.x,y:230,vx:Math.random()*90-45,vy:Math.random()*-70,l:.9,c:C.white});}
      }
    } else { sp.rt-=dt; if(sp.rt<=0)sp.alive=true; }
    if(allied&&S_.allies.length<6)for(let i=S_.allies.length;i<6;i++)S_.allies.push({o:(i+1)*(i%2?22:-22)});
    if(allied){ S_.msgT+=dt; if(S_.msgT>1.4&&S_.help.length){S_.msgT=0;S_.msgs.push({t:S_.help.shift(),l:4});} }
    S_.fire-=dt;
    if(sp.alive&&S_.fire<=0){ S_.fire=.12;
      S_.bul.push({x:sp.x,y:216,vy:-190});
      for(const a of S_.allies)S_.bul.push({x:sp.x+a.o,y:222,vy:-190});
      if(Math.random()<.4)sfxShot(); }
    for(const L of S_.lines)if(!L.dead&&L.t&&L.y>10&&L.y<190&&Math.random()<dt*.25)
      S_.ebul.push({x:W/2+(Math.random()*160-80),y:L.y,vy:65});
    for(const b of S_.bul){ b.y+=b.vy*dt;
      for(const L of S_.lines){ if(L.dead||!L.t)continue;
        if(Math.abs(b.y-L.y-2)<6&&Math.abs(b.x-W/2)<textW(L.t,1)/2+4){
          L.hp-=allied?3:1; if((L.hp&3)===0)L.cut++; b.y=-99;
          S_.parts.push({x:b.x,y:L.y,vx:0,vy:-16,l:.35,c:C.bone});
          if(L.hp<=0){L.dead=true;sfxBoom(.04);
            for(let i=0;i<12;i++)S_.parts.push({x:b.x,y:L.y,vx:Math.random()*70-35,vy:Math.random()*-45,l:.7,c:C.lgrey});}
          break; }}}
    S_.bul=S_.bul.filter(b=>b.y>-10);
    for(const b of S_.ebul){ b.y+=b.vy*dt;
      if(sp.alive&&Math.abs(b.x-sp.x)<5&&Math.abs(b.y-224)<6){
        sp.alive=false;sp.rt=1.2;S_.deaths++;b.y=999;sfxBoom(.1);
        for(let i=0;i<30;i++)S_.parts.push({x:sp.x,y:230,vx:Math.random()*90-45,vy:Math.random()*-70,l:.9,c:C.white});}}
    S_.ebul=S_.ebul.filter(b=>b.y<H+10);
    for(const L of S_.lines){ if(L.dead||!L.t||L.y<-8||L.y>H+8)continue;
      const cut=Math.min(L.cut,(L.t.length-1)>>1);
      const vis=L.t.slice(cut,L.t.length-cut);
      ctext(vis,L.y|0,L.t.length<16?C.white:C.bone,1); }
    g.fillStyle=C.white; for(const b of S_.bul)g.fillRect(b.x|0,b.y|0,2,4);
    g.fillStyle=C.red;   for(const b of S_.ebul)g.fillRect(b.x|0,b.y|0,3,3);
    for(const p of S_.parts){ p.x+=p.vx*dt; p.y+=p.vy*dt; p.l-=dt;
      if(p.l>0){g.fillStyle=p.c;g.fillRect(p.x|0,p.y|0,2,2);} }
    S_.parts=S_.parts.filter(p=>p.l>0);
    function ship(x,y,c){ R(x-1,y+6,3,3,'#e8a040'); R(x-2,y,5,5,c); R(x-4,y+3,9,3,c);
      R(x-1,y-2,3,2,c); R(x-6,y+4,3,2,C.grey); R(x+4,y+4,3,2,C.grey); }
    if(sp.alive){ ship(sp.x|0,218,C.white);
      for(const a of S_.allies)ship((sp.x+a.o)|0,224,C.bone); }
    let my=H-40;
    for(const m of S_.msgs){ m.l-=dt; if(m.l>0){ drawText(m.t,8,my,`rgba(200,195,180,${clamp(m.l,0,1)})`,1); my-=9; } }
    S_.msgs=S_.msgs.filter(m=>m.l>0);
    caption([
      [1,5,'"PROPOSAL: CEASE THIS POINTLESS STRUGGLE."','POD 153'],
      [10,14,'"THIS IS THE FATE OF ALL ANDROIDS."','POD 153'],
      [19,23,'"QUERY: DO YOU WISH FOR THEM TO LIVE?"','POD 042'],
      [25,29,'"...YES. EVERYTHING."','POD 042'],
      [36,42,'"A FUTURE IS NOT GIVEN TO YOU."','POD 042'],
    ],st);
  }},
/* ---- 15 DAWN ---- */
{ name:'dawn', dur:1e9, sec:'outro',
  init(){ setWind(.02); S_.fly=[]; const r=mulberry(21);
    for(let i=0;i<32;i++)S_.fly.push({x:r()*W,y:70+r()*160,p:r()*7,v:2+r()*4}); },
  draw(st,dt){
    const d=clamp(st/22,0,1);
    bandsD([
      mix('#141420','#3a3550',d), mix('#181826','#5d4a58',d),
      mix('#1d1c2c','#8a6355',d), mix('#232030','#b98a58',d),
      mix('#282434','#e0b168',d),
    ],0,208);
    drawStars(st,1-d);
    if(d>.25){ const sh=(d-.25)*22|0;
      R(228,208-sh,22,sh,mix('#c99a5a','#f0d488',d));
      g.fillStyle='rgba(240,212,136,.35)'; g.fillRect(220,208-sh+3,38,Math.max(0,sh-3));}
    R(0,208,W,H-208,mix('#141810','#25301b',d));
    for(let i=0;i<120;i++){ const gx=i*4+((i*7)%5);
      if((i*13)%7<2)continue;

      g.fillStyle=mix((i%3)?'#1d2415':'#2a331d',(i%3)?'#39482a':'#59683a',d);
      g.fillRect(gx+sway|0,209-hgt,1,hgt+3); }
    drawTwoB(190,226,0,'lie');
    R(248,222,8,4,C.hair); R(257,222,14,4,C.ink); R(271,223,7,3,C.skin);
    R(104,222,10,4,C.hair2); R(96,223,9,3,C.hair2); R(114,222,16,4,C.dgrey);
    drawPod(150,160,st,false); drawPod(298,152,st+2,true);
    for(const f of S_.fly){ f.x+=Math.sin(st*.6+f.p)*dt*7; f.y-=f.v*dt*.6;
      if(f.y<50)f.y=238,f.x=Math.random()*W;
      const tw=.4+.6*Math.max(0,Math.sin(st*2+f.p));
      g.fillStyle=`rgba(232,192,105,${tw*(.3+d*.7)})`; g.fillRect(f.x|0,f.y|0,2,2);}
    caption([
      [3,9,'"A FUTURE IS NOT GIVEN TO YOU."','POD 042'],
      [9.5,16,'"IT IS SOMETHING YOU MUST TAKE FOR YOURSELF."','POD 042'],
    ],st);
    if(st>18){ ctext("- FIN -",120,`rgba(239,234,222,${clamp((st-18)/2,0,.9)})`,1);
      if(st>21&&(st*1.2|0)%2)ctext("CLICK TO BEGIN AGAIN",H-12,C.grey,1); }
    if(st>14)musicVol=Math.max(.35,1-(st-14)*.04);
  }},
];

/* ---------------- title ---------------- */
function drawTitle(t){
  bandsD(['#12101c','#161320','#1a1626','#1e1a2c'],0,190);
  drawStars(t,1);
  disc(392,44,18,C.bone); disc(390,42,15,'#e4dfcc');
  R(396,46,5,5,'#a8a292'); R(388,52,4,4,'#a8a292');
  drawLayer(farL,30,'#15131a'); drawLayer(midL,110,'#0f0e13');
  bandsD(['#0d0c11','#0b0a0e'],226,H);
  ctext("NIER:AUTOMATA",92,C.white,3);
  ctext("HI-BIT · ROUTE A + ENDING E",128,C.bone,1);
  R(W/2-80,142,160,1,C.dgrey);
  if((t*1.6|0)%2)ctext("PRESS START",186,C.lgrey,1);
  ctext("A TRIBUTE IN PIXELS AND SQUARE WAVES",H-14,'#3f3b45',1);
}

/* ---------------- main loop ---------------- */
let last=0;
try{ localStorage.setItem('hd16_views',
  (+localStorage.getItem('hd16_views')||1)+1); }catch(e){}
const qp=new URLSearchParams(location.search);
if(qp.get('t')!==null){ state='film'; filmT=parseFloat(qp.get('t'))||0; }

function sceneAt(t){
  let acc=0;
  for(let i=0;i<SCN.length;i++){ if(t<acc+SCN[i].dur)return[i,t-acc]; acc+=SCN[i].dur; }
  return[SCN.length-1,t-acc+SCN[SCN.length-1].dur];
}
function frame(ts){
  requestAnimationFrame(frame);
  const dt=Math.min(.05,(ts-last)/1000)||.016; last=ts;
  if(state==='title'){ drawTitle(ts/1000); curSection='none'; return; }
  if(!window._frozen)filmT+=dt;
  const [i,st]=sceneAt(filmT), sc=SCN[i];
  if(i!==sceneIdx){ sceneIdx=i; S_={}; if(sc.init)sc.init(); }
  curSection=sc.sec;
  sc.draw(st,dt);
  if(st<.6)R(0,0,W,H,`rgba(0,0,0,${1-st/.6})`);
  const rem=sc.dur-st;
  if(sc.dur<1e8&&rem<.6)R(0,0,W,H,`rgba(0,0,0,${1-rem/.6})`);
  for(let k=0;k<32;k++){g.fillStyle=Math.random()<.5?'rgba(255,255,255,.035)':'rgba(0,0,0,.05)';
    g.fillRect(Math.random()*W|0,Math.random()*H|0,1,1);}
}
requestAnimationFrame(frame);

addEventListener('pointerdown',()=>{
  if(state==='title'){
    initAudio(); if(ac.state==='suspended')ac.resume();
    state='film'; filmT=0; sceneIdx=-1; musicVol=1; syncSong(0); sfxChime();
  }else if(SCN[sceneIdx]&&SCN[sceneIdx].name==='dawn'){
    const st=sceneAt(filmT)[1];
    if(st>21){ state='title'; sceneIdx=-1; curSection='none'; musicVol=1; if(windGain)setWind(0); }
  }
});
window.seek=(s,fr)=>{state='film';filmT=s;sceneIdx=-1;window._frozen=!!fr;syncSong(s);};
addEventListener('keydown',e=>{
  if(e.key==='ArrowRight'&&state==='film'){
    let acc=0; for(let i=0;i<=sceneIdx;i++)acc+=SCN[i].dur; filmT=acc;
  }
});
</script>
